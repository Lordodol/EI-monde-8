<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpireImmo - Calculateur Mobile & PC</title>
    <style>
        :root {
            --fond-sombre: #0f172a;
            --fond-carte: #1e293b;
            --fond-input: #0b0f19;
            --texte-blanc: #f8fafc;
            --texte-gris: #94a3b8;
            --bleu-flash: #38bdf8;
            --bleu-survol: #0284c7;
            --vert-gain: #4ade80;
            --rouge-perte: #f87171;
            --orange-badge: #fb923c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--fond-sombre);
            color: var(--texte-blanc);
            margin: 0;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: var(--fond-carte);
            padding: 20px 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin: 5px 0;
            font-size: 22px;
            color: var(--bleu-flash);
        }

        p.subtitle {
            text-align: center;
            color: var(--texte-gris);
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .zone-outils {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 10px;
        }

        .groupe-saisie {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .groupe-case {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 0;
        }

        .groupe-case input {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--texte-gris);
            text-transform: uppercase;
        }
        
        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            background-color: var(--fond-input);
            border: 2px solid #334155;
            border-radius: 8px;
            color: var(--texte-blanc);
            outline: none;
            width: 100%;
            font-weight: 600;
        }
        input:focus {
            border-color: var(--bleu-flash);
        }
        
        button {
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            background-color: var(--bleu-flash);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover {
            background-color: var(--bleu-survol);
            color: white;
        }

        #etat-chargement {
            text-align: center;
            font-weight: 600;
            color: var(--orange-badge);
            margin-bottom: 20px;
            font-size: 14px;
            padding: 0 10px;
        }

        .conteneur-tableau {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: #0f172a;
            color: var(--texte-blanc);
            font-weight: 700;
        }

        tr.ligne-principale:hover {
            background-color: #243249;
        }
        
        .nom-cliquable {
            color: var(--bleu-flash);
            cursor: pointer;
            font-weight: 600;
            white-space: normal; /* Permet au nom de passer à la ligne sur petit écran */
            min-width: 120px;
        }

        .ligne-details {
            background-color: #0f172a;
            display: none;
        }

        .boite-details {
            padding: 15px;
            border-left: 4px solid var(--bleu-flash);
            font-size: 13px;
            color: #cbd5e1;
            white-space: normal;
        }

        .boite-details h4 {
            margin: 0 0 12px 0;
            color: var(--texte-blanc);
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
            font-size: 14px;
        }
        
        .selecteur-terrain {
            padding: 8px;
            border: 2px solid #334155;
            border-radius: 6px;
            font-weight: 600;
            background: var(--fond-input);
            color: var(--texte-blanc);
            cursor: pointer;
            outline: none;
            margin-top: 5px;
            width: 100%;
            max-width: 300px;
        }

        .badge-quantite {
            background: #38bdf820;
            color: var(--bleu-flash);
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        .badge-temps {
            background: #fb923c20;
            color: var(--orange-badge);
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        .texte-gain { font-weight: 700; color: var(--vert-gain); }
        .texte-perte { font-weight: 700; color: var(--rouge-perte); }

        /* ================= DESIGN POUR ORDINATEUR (ÉCRANS LARGES) ================= */
        @media (min-width: 768px) {
            body { padding: 30px 20px; }
            .container { padding: 30px; }
            h1 { font-size: 28px; }
            
            .zone-outils {
                flex-direction: row;
                justify-content: center;
                gap: 20px;
                padding: 20px;
            }
            .groupe-saisie { width: auto; }
            input[type="text"] { width: 220px; }
            button { width: auto; padding: 11px 28px; }
            
            th, td { font-size: 14px; padding: 15px 20px; }
            .boite-details { padding: 20px; font-size: 14px; }
            .boite-details h4 { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Simulateur de Chantiers</h1>
        <p class="subtitle">Vos constructions maximales et bénéfices réels.</p>

        <div class="zone-outils">
            <div class="groupe-saisie">
                <label for="budgetInput">Votre capital disponible (€)</label>
                <input type="text" id="budgetInput" value="1 000 000">
            </div>
            <div class="groupe-case">
                <input type="checkbox" id="entrepriseCheck" checked>
                <label for="entrepriseCheck" style="color: var(--texte-blanc); text-transform: none;">Bâtiments d'entreprise</label>
            </div>
            <button onclick="analyserStrategieAmortissement(true)">Calculer</button>
        </div>

        <div id="etat-chargement">Entrez votre capital et cliquez sur Calculer.</div>

        <div class="conteneur-tableau">
            <table id="resultsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Bâtiment</th>
                        <th>Type</th>
                        <th>Prix revient</th>
                        <th>Max</th>
                        <th>Bénéfice total</th>
                        <th>Remboursement</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const MON_PROXY = 'https://mon-proxy-empire.yangtiradol.workers.dev/?url=';
        const API_BUILDINGS = MON_PROXY + encodeURIComponent('https://monde8.empireimmo.com/api/buildings.json');

        let dataBuildings = null;
        let choixTerrainsUtilisateur = {}; 

        const formatNumber = (num) => new Intl.NumberFormat('fr-FR').format(Math.round(num));

        document.getElementById('budgetInput').addEventListener('input', function(e) {
            let valeurBrute = e.target.value.replace(/\D/g, '');
            if (valeurBrute === '') { e.target.value = ''; return; }
            e.target.value = new Intl.NumberFormat('fr-FR').format(parseInt(valeurBrute, 10));
        });

        function toggleDetails(id) {
            const row = document.getElementById(id);
            row.style.display = row.style.display === 'table-row' ? 'none' : 'table-row';
        }

        function modifierTerrainDirect(batNom, indexTerrain) {
            choixTerrainsUtilisateur[batNom] = parseInt(indexTerrain);
            analyserStrategieAmortissement(false);
        }

        async function analyserStrategieAmortissement(remettreAzeroStatut = true) {
            const budgetBrutStr = document.getElementById('budgetInput').value.replace(/\s/g, '');
            const budget = parseFloat(budgetBrutStr);
            const inclureEntreprise = document.getElementById('entrepriseCheck').checked;
            
            const statusDiv = document.getElementById('etat-chargement');
            const table = document.getElementById('resultsTable');
            const tbody = document.getElementById('resultsBody');

            if (isNaN(budget) || budget <= 0) {
                statusDiv.innerText = "Veuillez entrer une somme valide.";
                return;
            }

            if (remettreAzeroStatut) {
                statusDiv.innerText = "Téléchargement des données...";
            }
            
            tbody.innerHTML = '';

            try {
                if (!dataBuildings) {
                    const res = await fetch(API_BUILDINGS);
                    dataBuildings = await res.json();
                }

                const terrains = dataBuildings.batiments_terrain || [];
                let listeBatiments = [];
                
                if (dataBuildings.batiments_perso) {
                    dataBuildings.batiments_perso.forEach(b => { b.categorie = "Perso"; listeBatiments.push(b); });
                }
                if (inclureEntreprise && dataBuildings.batiments_entreprise) {
                    dataBuildings.batiments_entreprise.forEach(b => { b.categorie = "🏢 Entreprise"; listeBatiments.push(b); });
                }

                let opportunites = [];

                listeBatiments.forEach((b, index) => {
                    const prixConstruction = parseFloat(b.construction) || 0;
                    if (prixConstruction <= 0) return; 

                    if (choixTerrainsUtilisateur[b.nom] === undefined) {
                        choixTerrainsUtilisateur[b.nom] = 0; 
                    }
                    
                    const indexTerrainActuel = choixTerrainsUtilisateur[b.nom];
                    const terrainApplique = terrains[indexTerrainActuel] || terrains[0];

                    const prixTerrain = parseFloat(terrainApplique.valeur) || 0;
                    const valeurFinale = parseFloat(b.valeur) || 0;
                    const loyer = parseFloat(b.loyer) || 0;
                    const charge = parseFloat(b.charge) || 0;
                    const impot = parseFloat(b.impot) || 0;

                    const coutUnitaire = prixTerrain + prixConstruction + 1000;
                    const gainUnitaire = valeurFinale - coutUnitaire;
                    const quantiteMax = Math.floor(budget / coutUnitaire);

                    if (quantiteMax > 0) {
                        const gainTotalCumule = gainUnitaire * quantiteMax;
                        const gainNetMensuel = loyer - (charge + impot);
                        
                        let moisRemboursementStr = "Loyer nul";
                        if (gainNetMensuel > 0) {
                            moisRemboursementStr = `${(coutUnitaire / gainNetMensuel).toFixed(1)} m`;
                        }

                        opportunites.push({
                            idUnique: `details-${index}`,
                            nom: b.nom,
                            type: b.categorie,
                            coutUnitaire: coutUnitaire,
                            quantiteMax: quantiteMax,
                            gainTotalCumule: gainTotalCumule,
                            tempsRemboursement: moisRemboursementStr,
                            indexTerrainActuel: indexTerrainActuel,
                            brut: {
                                terrainNom: terrainApplique.nom,
                                terrainPrix: prixTerrain,
                                construction: prixConstruction,
                                valeurFinale: valeurFinale,
                                loyer: loyer,
                                charge: charge,
                                impot: impot,
                                gainNetMensuel: gainNetMensuel
                            }
                        });
                    }
                });

                opportunites.sort((a, b) => b.gainTotalCumule - a.gainTotalCumule);

                if (opportunites.length === 0) {
                    statusDiv.innerText = "Fonds insuffisants.";
                    return;
                }

                if (remettreAzeroStatut) {
                    statusDiv.innerText = "Calculs terminés ! Cliquez sur un bâtiment pour voir le détail.";
                }

                opportunites.forEach(o => {
                    const trPrincipal = document.createElement('tr');
                    trPrincipal.className = "ligne-principale";
                    
                    const classeCouleur = o.gainTotalCumule >= 0 ? "texte-gain" : "texte-perte";
                    const signe = o.gainTotalCumule >= 0 ? "+" : "";

                    trPrincipal.innerHTML = `
                        <td class="nom-cliquable" onclick="toggleDetails('${o.idUnique}')">📁 ${o.nom}</td>
                        <td>${o.type}</td>
                        <td>${formatNumber(o.coutUnitaire)} €</td>
                        <td><span class="badge-quantite">x${o.quantiteMax}</span></td>
                        <td class="${classeCouleur}">${signe}${formatNumber(o.gainTotalCumule)} €</td>
                        <td><span class="badge-temps">${o.tempsRemboursement}</span></td>
                    `;
                    tbody.appendChild(trPrincipal);

                    let optionsHTML = "";
                    terrains.forEach((t, idx) => {
                        const selected = idx === o.indexTerrainActuel ? "selected" : "";
                        optionsHTML += `<option value="${idx}" ${selected}>${t.nom} (${formatNumber(t.valeur)} €)</option>`;
                    });

                    const trDetails = document.createElement('tr');
                    trDetails.id = o.idUnique;
                    trDetails.className = "ligne-details";
                    
                    trDetails.innerHTML = `
                        <td colspan="6">
                            <div class="boite-details">
                                <h4>📐 CALCULS COMPLETS : ${o.nom}</h4>
                                
                                <div style="margin-bottom: 15px;">
                                    <strong>Modifier le terrain :</strong><br>
                                    <select class="selecteur-terrain" onchange="modifierTerrainDirect('${o.nom.replace(/'/g, "\\'")}', this.value)">
                                        ${optionsHTML}
                                </select>
                                </div>
                                
                                <p>
                                    <strong>1. Prix de revient (fabrication) :</strong><br>
                                    • Terrain : ${formatNumber(o.brut.terrainPrix)} € (${o.brut.terrainNom})<br>
                                    • Chantier : + ${formatNumber(o.brut.construction)} €<br>
                                    • Taxe fixe : + 1 000 €<br>
                                    ➡️ Total = <strong>${formatNumber(o.coutUnitaire)} €</strong> par bâtiment.
                                </p>
                                
                                <p>
                                    <strong>2. Bénéfice (plus-value) :</strong><br>
                                    • Valeur finale du bien : ${formatNumber(o.brut.valeurFinale)} €<br>
                                    • Prix de revient : - ${formatNumber(o.coutUnitaire)} €<br>
                                    ➡️ Bénéfice par unité = <strong>${formatNumber(o.gainTotalCumule / o.quantiteMax)} €</strong>.<br>
                                    💰 <em>Pour x${o.quantiteMax} unités = <span class="${classeCouleur}">${signe}${formatNumber(o.gainTotalCumule)} €</span> au total.</em>
                                </p>
                                
                                <p>
                                    <strong>3. Loyer net & Amortissement :</strong><br>
                                    • Loyer brut : ${formatNumber(o.brut.loyer)} € / mois<br>
                                    • Charges + Impôts : - (${formatNumber(o.brut.charge)} € + ${formatNumber(o.brut.impot)} €)<br>
                                    ➡️ Loyer net en poche = <strong>${formatNumber(o.brut.gainNetMensuel)} €</strong> / mois.<br>
                                    ⏱️ Temps de remboursement : ${formatNumber(o.coutUnitaire)} € (coût) ÷ ${formatNumber(o.brut.gainNetMensuel)} € (loyer) = <strong>${o.tempsRemboursement}</strong>.
                                </p>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(trDetails);
                });

                table.style.display = 'table';

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "⚠️ Erreur de chargement des données.";
            }
        }
    </script>
</body>
</html>
