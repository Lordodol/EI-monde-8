<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpireImmo - Simulateur Mobile Pro</title>
    <style>
        :root {
            --fond-sombre: #0f172a;
            --fond-carte: #1e293b;
            --fond-input: #0b0f19;
            --texte-blanc: #f8fafc;
            --texte-gris: #94a3b8;
            --bleu-flash: #38bdf8;
            --bleu-survol: #0284c7;
            --vert-gain: #4ade80;
            --rouge-perte: #f87171;
            --orange-badge: #fb923c;
            --violet-badge: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--fond-sombre);
            color: var(--texte-blanc);
            padding: 8px;
            line-height: 1.4;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: var(--fond-carte);
            padding: 15px 10px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-top: 5px;
            font-size: 20px;
            color: var(--bleu-flash);
        }

        p.subtitle {
            text-align: center;
            color: var(--texte-gris);
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .zone-outils {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
        }

        .groupe-saisie {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        .groupe-case {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 0;
        }

        .groupe-case input {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--texte-gris);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            background-color: var(--fond-input);
            border: 2px solid #334155;
            border-radius: 8px;
            color: var(--texte-blanc);
            outline: none;
            width: 100%;
            font-weight: 600;
        }
        input:focus {
            border-color: var(--bleu-flash);
        }
        
        button {
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            background-color: var(--bleu-flash);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover {
            background-color: var(--bleu-survol);
            color: white;
        }

        #etat-chargement {
            text-align: center;
            font-weight: 600;
            color: var(--orange-badge);
            margin-bottom: 15px;
            font-size: 13px;
        }

        .conteneur-tableau {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid #334155;
            text-align: left;
            font-size: 12px;
        }

        th {
            background-color: #0f172a;
            color: var(--texte-blanc);
            font-weight: 700;
            white-space: nowrap;
        }

        tr.ligne-principale:hover {
            background-color: #243249;
        }
        
        .nom-cliquable {
            color: var(--bleu-flash);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        
        .type-sous-titre {
            display: block;
            font-size: 10px;
            color: var(--texte-gris);
            font-weight: 400;
            margin-top: 2px;
        }

        .ligne-details {
            background-color: #0f172a;
            display: none;
        }

        .boite-details {
            padding: 10px 6px;
            border-left: 4px solid var(--bleu-flash);
            color: #cbd5e1;
        }

        .boite-details h4 {
            margin: 0 0 10px 0;
            color: var(--texte-blanc);
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
            font-size: 13px;
        }
        
        .selecteur-terrain {
            padding: 8px;
            border: 2px solid #334155;
            border-radius: 6px;
            font-weight: 600;
            background: var(--fond-input);
            color: var(--texte-blanc);
            cursor: pointer;
            outline: none;
            margin-top: 4px;
            width: 100%;
        }

        .badge-quantite {
            background: #38bdf820;
            color: var(--bleu-flash);
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-temps {
            background: #fb923c20;
            color: var(--orange-badge);
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-terrain-auto {
            background: #c084fc15;
            color: var(--violet-badge);
            padding: 4px 6px;
            border-radius: 4px;
            font-weight: 700;
            display: inline-block;
            font-size: 11px;
        }

        .texte-gain { font-weight: 700; color: var(--vert-gain); }
        .texte-perte { font-weight: 700; color: var(--rouge-perte); }

        /* Structure du tableau financier de détails */
        .table-details {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: #0b0f19;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2d3748;
        }
        
        .table-details th {
            background-color: #161f30 !important;
            color: var(--bleu-flash) !important;
            font-size: 11px;
            text-transform: uppercase;
            padding: 8px;
            border-bottom: 1px solid #2d3748;
        }
        
        .table-details td {
            padding: 8px;
            font-size: 11px;
            border-bottom: 1px solid #1e293b;
            color: #e2e8f0;
        }
        
        .table-details .section-titre {
            background-color: #0f172a;
            font-weight: 700;
            color: var(--texte-gris);
            font-size: 10px;
        }
        
        .table-details .total-brut {
            background-color: #131c2e;
            font-weight: 600;
        }
        
        .table-details .gain-sub {
            background-color: rgba(74, 222, 128, 0.08);
            color: var(--vert-gain);
        }

        .table-details .perte-sub {
            background-color: rgba(248, 113, 113, 0.08);
            color: var(--rouge-perte);
        }

        /* ================= AJUSTEMENTS ÉCRANS LARGES (PC / TABLETTES) ================= */
        @media (min-width: 768px) {
            body { padding: 25px 15px; }
            .container { padding: 25px; }
            h1 { font-size: 26px; }
            p.subtitle { font-size: 14px; margin-bottom: 25px; }
            
            .zone-outils {
                flex-direction: row;
                justify-content: center;
                align-items: flex-end;
                gap: 20px;
                padding: 15px;
            }
            .groupe-saisie { width: auto; }
            input[type="text"] { width: 220px; }
            button { width: auto; padding: 12px 30px; }
            
            th, td { font-size: 14px; padding: 12px 15px; }
            .nom-cliquable { font-size: 14px; }
            .type-sous-titre { font-size: 11px; }

            .boite-details { padding: 15px; }
            .boite-details h4 { font-size: 15px; }
            .table-details th { font-size: 12px; padding: 10px; }
            .table-details td { font-size: 13px; padding: 10px 12px; }
            .table-details .section-titre { font-size: 11px; }
            .selecteur-terrain { max-width: 350px; }
        }
    </style>
</head>

        let dataBuildings = null;
        let choixTerrainsUtilisateur = {}; 

        const formatNumber = (num) => new Intl.NumberFormat('fr-FR').format(Math.round(num));

        document.getElementById('budgetInput').addEventListener('input', function(e) {
            let valeurBrute = e.target.value.replace(/\D/g, '');
            if (valeurBrute === '') { e.target.value = ''; return; }
            e.target.value = new Intl.NumberFormat('fr-FR').format(parseInt(valeurBrute, 10));
        });

        function toggleDetails(id) {
            const row = document.getElementById(id);
            row.style.display = row.style.display === 'table-row' ? 'none' : 'table-row';
        }

        function modifierTerrainDirect(batNom, indexTerrain) {
            choixTerrainsUtilisateur[batNom] = parseInt(indexTerrain);
            analyserStrategieAmortissement(false);
        }

        async function analyserStrategieAmortissement(remettreAzeroStatut = true) {
            const budgetBrutStr = document.getElementById('budgetInput').value.replace(/\s/g, '');
            const budget = parseFloat(budgetBrutStr);
            const inclureEntreprise = document.getElementById('entrepriseCheck').checked;
            
            const statusDiv = document.getElementById('etat-chargement');
            const table = document.getElementById('resultsTable');
            const tbody = document.getElementById('resultsBody');

            if (isNaN(budget) || budget <= 0) {
                statusDiv.innerText = "Veuillez entrer une somme valide.";
                return;
            }

            if (remettreAzeroStatut) {
                statusDiv.innerText = "Téléchargement des données en cours...";
            }
            
            tbody.innerHTML = '';

            try {
                if (!dataBuildings) {
                    const res = await fetch(API_BUILDINGS);
                    dataBuildings = await res.json();
                }

                const terrains = dataBuildings.batiments_terrain || [];
                let listeBatiments = [];
                
                if (dataBuildings.batiments_perso) {
                    dataBuildings.batiments_perso.forEach(b => { b.categorie = "Perso"; listeBatiments.push(b); });
                }
                if (inclureEntreprise && dataBuildings.batiments_entreprise) {
                    dataBuildings.batiments_entreprise.forEach(b => { b.categorie = "🏢 Entreprise"; listeBatiments.push(b); });
                }

                let opportunites = [];

                listeBatiments.forEach((b, index) => {
                    const prixConstruction = parseFloat(b.construction) || 0;
                    if (prixConstruction <= 0) return; 

                    const specs = SPECS_BUILDINGS[b.nom] || { temps_construction: "", terrain_necessaire: "" };
                    let tempsConst = specs.temps_construction || "—";
                    let terrainReq = specs.terrain_necessaire || "";

                    let terrainApplique = null;
                    let aBesoinDeSelecteur = true;

                    if (terrainReq && terrainReq.trim() !== "") {
                        terrainApplique = terrains.find(t => t.nom.toLowerCase().trim() === terrainReq.toLowerCase().trim());
                        if (terrainApplique) {
                            aBesoinDeSelecteur = false; 
                        }
                    }

                    if (!terrainApplique) {
                        if (choixTerrainsUtilisateur[b.nom] === undefined) {
                            choixTerrainsUtilisateur[b.nom] = 0; 
                        }
                        const indexTerrainActuel = choixTerrainsUtilisateur[b.nom];
                        terrainApplique = terrains[indexTerrainActuel] || terrains[0];
                    }

                    const prixTerrain = parseFloat(terrainApplique.valeur) || 0;
                    const valeurFinale = parseFloat(b.valeur) || 0;
                    const loyer = parseFloat(b.loyer) || 0;
                    const charge = parseFloat(b.charge) || 0;
                    const impot = parseFloat(b.impot) || 0;

                    const coutUnitaire = prixTerrain + prixConstruction + 1000;
                    const gainUnitaire = valeurFinale - coutUnitaire;
                    const quantiteMax = Math.floor(budget / coutUnitaire);

                    if (quantiteMax > 0) {
                        const gainTotalCumule = gainUnitaire * quantiteMax;
                        const gainNetMensuel = loyer - (charge + impot);
                        
                        let moisRemboursementStr = "Loyer nul";
                        if (gainNetMensuel > 0) {
                            moisRemboursementStr = `${(coutUnitaire / gainNetMensuel).toFixed(1)} mois`;
                        }

                        opportunites.push({
                            idUnique: `details-${index}`,
                            nom: b.nom,
                            type: b.categorie,
                            coutUnitaire: coutUnitaire,
                            quantiteMax: quantiteMax,
                            gainTotalCumule: gainTotalCumule,
                            tempsRemboursement: moisRemboursementStr,
                            tempsConstruction: tempsConst,
                            terrainNecessaire: terrainReq,
                            aBesoinDeSelecteur: aBesoinDeSelecteur,
                            terrainApplique: terrainApplique,
                            brut: {
                                terrainNom: terrainApplique.nom,
                                terrainPrix: prixTerrain,
                                construction: prixConstruction,
                                valeurFinale: valeurFinale,
                                loyer: loyer,
                                charge: charge,
                                impot: impot,
                                gainNetMensuel: gainNetMensuel
                            }
                        });
                    }
                });

                opportunites.sort((a, b) => b.gainTotalCumule - a.gainTotalCumule);

                if (opportunites.length === 0) {
                    statusDiv.innerText = "Fonds insuffisants.";
                    return;
                }

                if (remettreAzeroStatut) {
                    statusDiv.innerText = "Sélectionnez un bâtiment pour voir sa fiche financière.";
                }

                opportunites.forEach(o => {
                    const trPrincipal = document.createElement('tr');
                    trPrincipal.className = "ligne-principale";
                    
                    const classeCouleur = o.gainTotalCumule >= 0 ? "texte-gain" : "texte-perte";
                    const signe = o.gainTotalCumule >= 0 ? "+" : "";

                    // Optimisation Mobile : Affichage du type sous le nom (Économise une colonne entière)
                    trPrincipal.innerHTML = `
                        <td class="nom-cliquable" onclick="toggleDetails('${o.idUnique}')">
                            📁 ${o.nom}
                            <span class="type-sous-titre">${o.type}</span>
                        </td>
                        <td><span class="badge-quantite">x${o.quantiteMax}</span></td>
                        <td class="${classeCouleur}">${signe}${formatNumber(o.gainTotalCumule)} €</td>
                        <td><span class="badge-temps">${o.tempsRemboursement}</span></td>
                    `;
                    tbody.appendChild(trPrincipal);

                    let zoneTerrainHTML = "";
                    if (o.aBesoinDeSelecteur) {
                        let optionsHTML = "";
                        terrains.forEach((t, idx) => {
                            const selected = t.nom === o.terrainApplique.nom ? "selected" : "";
                            optionsHTML += `<option value="${idx}" ${selected}>${t.nom} (${formatNumber(t.valeur)} €)</option>`;
                        });
                        zoneTerrainHTML = `
                            <div>
                                <strong>Ajuster la taille du terrain :</strong><br>
                                <select class="selecteur-terrain" onchange="modifierTerrainDirect('${o.nom.replace(/'/g, "\\'")}', this.value)">
                                    ${optionsHTML}
                                </select>
                            </div>
                        `;
                    } else {
                        zoneTerrainHTML = `
                            <div>
                                <span class="badge-terrain-auto">🔒 Terrain obligatoire appliqué : ${o.terrainApplique.nom}</span>
                            </div>
                        `;
                    }

                    const trDetails = document.createElement('tr');
                    trDetails.id = o.idUnique;
                    trDetails.className = "ligne-details";
                    
                    const gainUnitaire = o.gainTotalCumule / o.quantiteMax;
                    const classeLigneGain = gainUnitaire >= 0 ? "gain-sub" : "perte-sub";

                    // Tableau financier imbriqué : calibré pour ne pas briser l'affichage sur mobile
                    trDetails.innerHTML = `
                        <td colspan="4">
                            <div class="boite-details">
                                <h4>📊 RAPPORT COMPTABLE : ${o.nom}</h4>
                                
                                <div style="margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; background: #0b0f19; padding: 10px; border-radius: 6px; font-size: 11px;">
                                    <div><strong>Temps de chantier :</strong> ${o.tempsConstruction === "—" ? "Immédiat / Inconnu" : o.tempsConstruction + " jours"}</div>
                                    ${zoneTerrainHTML}
                                </div>

                                <table class="table-details">
                                    <thead>
                                        <tr>
                                            <th>Élément</th>
                                            <th>À l'unité</th>
                                            <th>Total (x${o.quantiteMax})</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="section-titre"><td colspan="3">1. Investissement de départ</td></tr>
                                        <tr><td>Prix du terrain</td><td>${formatNumber(o.brut.terrainPrix)} €</td><td>${formatNumber(o.brut.terrainPrix * o.quantiteMax)} €</td></tr>
                                        <tr><td>Coût chantier</td><td>${formatNumber(o.brut.construction)} €</td><td>${formatNumber(o.brut.construction * o.quantiteMax)} €</td></tr>
                                        <tr><td>Taxe fixe</td><td>1 000 €</td><td>${formatNumber(1000 * o.quantiteMax)} €</td></tr>
                                        <tr class="total-brut"><td>Revient total</td><td><strong>${formatNumber(o.coutUnitaire)} €</strong></td><td><strong>${formatNumber(o.coutUnitaire * o.quantiteMax)} €</strong></td></tr>
                                        
                                        <tr class="section-titre"><td colspan="3">2. Estimation Revente</td></tr>
                                        <tr><td>Valeur finale</td><td>${formatNumber(o.brut.valeurFinale)} €</td><td>${formatNumber(o.brut.valeurFinale * o.quantiteMax)} €</td></tr>
                                        <tr class="${classeLigneGain}"><td>Plus-value nette</td><td><strong>${signe}${formatNumber(gainUnitaire)} €</strong></td><td><strong>${signe}${formatNumber(o.gainTotalCumule)} €</strong></td></tr>
                                        
                                        <tr class="section-titre"><td colspan="3">3. Rendement Locatif Mensuel</td></tr>
                                        <tr><td>Loyer Brut</td><td>${formatNumber(o.brut.loyer)} €</td><td>${formatNumber(o.brut.loyer * o.quantiteMax)} €</td></tr>
                                        <tr><td>Charges</td><td>- ${formatNumber(o.brut.charge)} €</td><td>- ${formatNumber(o.brut.charge * o.quantiteMax)} €</td></tr>
                                        <tr><td>Impôts</td><td>- ${formatNumber(o.brut.impot)} €</td><td>- ${formatNumber(o.brut.impot * o.quantiteMax)} €</td></tr>
                                        <tr class="total-brut"><td>Cashflow Net</td><td><span class="texte-gain">${formatNumber(o.brut.gainNetMensuel)} €/m</span></td><td><span class="texte-gain">${formatNumber(o.brut.gainNetMensuel * o.quantiteMax)} €/m</span></td></tr>
                                        
                                        <tr class="section-titre"><td colspan="3">4. Amortissement</td></tr>
                                        <tr><td>Seuil de rentabilité</td><td colspan="2" style="text-align: center; font-weight: 800; color: var(--orange-badge); font-size: 13px;">${o.tempsRemboursement}</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(trDetails);
                });

                table.style.display = 'table';

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "⚠️ Erreur lors de la mise à jour des calculs.";
            }
        }
    </script>
</body>
</html>
