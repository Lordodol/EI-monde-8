<script>
    /* ══════════════════════════════════════════════
       CONFIG — URLs de l'API distante via proxy CORS
    ══════════════════════════════════════════════ */
    const PROXY = 'https://mon-proxy-empire.yangtiradol.workers.dev/?url=';
    const API   = PROXY + encodeURIComponent('https://monde8.empireimmo.com/api/buildings.json');

    /* ══════════════════════════════════════════════
       SPECS — Données statiques par bâtiment :
       "t" = durée de construction en jours
       "tr" = type de terrain requis (vide = choisissable)
    ══════════════════════════════════════════════ */
    const SPECS = {
        "Chambre seule habitable": {"t":"0","tr":""},"Chambre seule non-aménagée": {"t":"0","tr":""},"Chambre seule tout confort": {"t":"0","tr":""},"Chambre seule équipée": {"t":"0","tr":""},
        "Complexe résidentiel géant habitable": {"t":"20","tr":"Grand parc"},"Complexe résidentiel géant luxueux": {"t":"20","tr":"Grand parc"},"Complexe résidentiel géant non-aménagé": {"t":"20","tr":"Grand parc"},"Complexe résidentiel géant tout confort": {"t":"20","tr":"Grand parc"},
        "Complexe résidentiel millenium habitable": {"t":"102","tr":"Grand parc"},"Complexe résidentiel millenium luxueux": {"t":"102","tr":"Grand parc"},"Complexe résidentiel millenium non-aménagé": {"t":"102","tr":"Grand parc"},"Complexe résidentiel millenium tout confort": {"t":"102","tr":"Grand parc"},
        "Complexe résidentiel moyen habitable": {"t":"16","tr":"Grand parc"},"Complexe résidentiel moyen luxueux": {"t":"16","tr":"Grand parc"},"Complexe résidentiel moyen non-aménagé": {"t":"16","tr":"Grand parc"},"Complexe résidentiel moyen tout confort": {"t":"16","tr":"Grand parc"},
        "Complexe résidentiel palacium habitable": {"t":"102","tr":"Grand parc"},"Complexe résidentiel palacium luxueux": {"t":"102","tr":"Grand parc"},"Complexe résidentiel palacium non-aménagé": {"t":"102","tr":"Grand parc"},"Complexe résidentiel palacium tout confort": {"t":"102","tr":"Grand parc"},
        "Complexe résidentiel titanium habitable": {"t":"102","tr":"Grand parc"},"Complexe résidentiel titanium luxueux": {"t":"102","tr":"Grand parc"},"Complexe résidentiel titanium non-aménagé": {"t":"102","tr":"Grand parc"},"Complexe résidentiel titanium tout confort": {"t":"102","tr":"Grand parc"},
        "Double complexe résidentiel géant habitable": {"t":"40","tr":"Grand parc"},"Double complexe résidentiel géant luxueux": {"t":"40","tr":"Grand parc"},"Double complexe résidentiel géant non-aménagé": {"t":"40","tr":"Grand parc"},"Double complexe résidentiel géant tout confort": {"t":"40","tr":"Grand parc"},
        "Grand complexe résidentiel habitable": {"t":"24","tr":"Grand parc"},"Grand complexe résidentiel luxueux": {"t":"24","tr":"Grand parc"},"Grand complexe résidentiel non-aménagé": {"t":"24","tr":"Grand parc"},"Grand complexe résidentiel tout confort": {"t":"24","tr":"Grand parc"},
        "Grande maison abandonnée": {"t":"0","tr":""},"Grande maison habitable": {"t":"0","tr":""},"Grande maison luxueuse": {"t":"0","tr":""},"Grande maison équipée": {"t":"0","tr":""},
        "Maison moyenne  abandonnée": {"t":"0","tr":""},"Maison moyenne habitable": {"t":"0","tr":""},"Maison moyenne luxueuse": {"t":"0","tr":""},"Maison moyenne équipée": {"t":"0","tr":""},
        "Petit complexe résidentiel habitable": {"t":"12","tr":"Parc"},"Petit complexe résidentiel luxueux": {"t":"12","tr":"Parc"},"Petit complexe résidentiel non-aménagé": {"t":"12","tr":"Parc"},"Petit complexe résidentiel tout confort": {"t":"12","tr":"Parc"},
        "Petite maison abandonnée": {"t":"0","tr":""},"Petite maison habitable": {"t":"0","tr":""},"Petite maison luxueuse": {"t":"0","tr":""},"Petite maison équipée": {"t":"0","tr":""},
        "Quadruple complexe résidentiel géant habitable": {"t":"72","tr":"Grand parc"},"Quadruple complexe résidentiel géant luxueux": {"t":"72","tr":"Grand parc"},"Quadruple complexe résidentiel géant non-aménagé": {"t":"72","tr":"Grand parc"},"Quadruple complexe résidentiel géant tout confort": {"t":"72","tr":"Grand parc"},
        "Res. 12 T2 grand luxe": {"t":"4","tr":"Terrain moyen"},"Res. 12 T2 habitables": {"t":"4","tr":"Terrain moyen"},"Res. 12 T2 non-aménagés": {"t":"4","tr":"Terrain moyen"},"Res. 12 T2 équipés": {"t":"4","tr":"Terrain moyen"},
        "Res. 12 chambres habitables": {"t":"4","tr":"Terrain moyen"},"Res. 12 chambres tout confort": {"t":"4","tr":"Terrain moyen"},"Res. 12 chambres vides": {"t":"4","tr":"Terrain moyen"},"Res. 12 chambres équipées": {"t":"4","tr":"Terrain moyen"},
        "Res. 24 T2 grand luxe": {"t":"6","tr":"Grand terrain"},"Res. 24 T2 habitables": {"t":"6","tr":"Grand terrain"},"Res. 24 T2 non-aménagés": {"t":"6","tr":"Grand terrain"},"Res. 24 T2 équipés": {"t":"6","tr":"Grand terrain"},
        "Res. 24 chambres habitables": {"t":"6","tr":"Grand terrain"},"Res. 24 chambres tout confort": {"t":"6","tr":"Grand terrain"},"Res. 24 chambres vides": {"t":"6","tr":"Grand terrain"},"Res. 24 chambres équipées": {"t":"6","tr":"Grand terrain"},
        "Res. 48 T2 grand luxe": {"t":"8","tr":"Parc"},"Res. 48 T2 habitables": {"t":"8","tr":"Parc"},"Res. 48 T2 non-aménagés": {"t":"8","tr":"Parc"},"Res. 48 T2 équipés": {"t":"8","tr":"Parc"},
        "Res. 48 chambres habitables": {"t":"8","tr":"Parc"},"Res. 48 chambres tout confort": {"t":"8","tr":"Parc"},"Res. 48 chambres vides": {"t":"8","tr":"Parc"},"Res. 48 chambres équipées": {"t":"8","tr":"Parc"},
        "Res. 6 T2 grand luxe": {"t":"2","tr":"Petit terrain"},"Res. 6 T2 habitables": {"t":"2","tr":"Petit terrain"},"Res. 6 T2 non-aménagés": {"t":"2","tr":"Petit terrain"},"Res. 6 T2 équipés": {"t":"6","tr":"Grand terrain"},
        "Res. 6 chambres habitables": {"t":"0","tr":""},"Res. 6 chambres tout confort": {"t":"0","tr":""},"Res. 6 chambres vides": {"t":"0","tr":""},"Res. 6 chambres équipées": {"t":"0","tr":""},
        "T2 simple habitable": {"t":"0","tr":""},"T2 simple luxueux": {"t":"0","tr":""},"T2 simple non-aménagé": {"t":"0","tr":""},"T2 simple équipé": {"t":"0","tr":""},
        "Triple complexe résidentiel géant habitable": {"t":"64","tr":"Grand parc"},"Triple complexe résidentiel géant luxueux": {"t":"64","tr":"Grand parc"},"Triple complexe résidentiel géant non-aménagé": {"t":"64","tr":"Grand parc"},"Triple complexe résidentiel géant tout confort": {"t":"64","tr":"Grand parc"}
    };

    /* ══════ ÉTAT GLOBAL ══════ */
    let dataCache    = null;           // Cache des données API (null = pas encore chargé)
    let opps1        = [];             // Liste des opportunités Construction/Vente (tab 1)
    let opps2        = [];             // Liste des opportunités Achat/Location (tab 2)
    let opps3        = [];             // Liste des items pour le classement comparatif (tab 3)
    let choixTerrain = {};             // Terrain sélectionné par bâtiment { nomBat: index }
    let triActuel    = { 1: 'performance', 2: 'roi' };  // Clé de tri actuelle par tab (tab 3 n'utilise pas de tri manuel)
    let triSens      = { 1: -1, 2: -1 };                // Sens du tri : -1 = décroissant, 1 = croissant
    let afficherTout = { 1: false, 2: false };           // Contrôle l'affichage des non-rentables
    let tabActif     = 1;              // Onglet actif (1, 2 ou 3)
    let oppOuverte   = null;           // Objet de l'opportunité affichée dans la modal
    // Mémorise la stratégie affichée dans la modal du tab 3 (pour savoir quelle modal ouvrir)
    let modalStratType = null;         // 'achat-location' | 'construction-vente' | 'construction-location'

    /* ══════ UTILS — Formatage des nombres ══════ */
    // fmt : formate un nombre entier au format français (séparateur de milliers)
    const fmt  = n => new Intl.NumberFormat('fr-FR').format(Math.round(n));
    // fmtS : idem avec signe + si positif et un suffixe optionnel (ex: " €/j")
    const fmtS = (n, suffix='') => (n >= 0 ? '+' : '') + fmt(n) + suffix;
    // fmtD : formate une durée en jours (∞ si Infinity ou NaN)
    const fmtD = n => n === Infinity || isNaN(n) ? '∞' : fmt(n) + ' j';

    /* ══════════════════════════════════════════════
       switchTab — Change l'onglet actif
       - Met à jour la classe .active sur les boutons et contenus
       - Masque le champ "Objectif" sur le tab 2 (pas pertinent pour la location)
    ══════════════════════════════════════════════ */
    function switchTab(n) {
        tabActif = n;
        document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i+1 === n));
        document.querySelectorAll('.tab-content').forEach((c,i) => c.classList.toggle('active', i+1 === n));
        document.getElementById('objectifField').style.display = (n === 2) ? 'none' : '';
    }

    /* ══════════════════════════════════════════════
       toggleEntreprises — Active/désactive les bâtiments entreprise
       - Inverse l'état de la case à cocher cachée
       - Met à jour le toggle visuel
       - Relance l'analyse si des données sont déjà chargées
    ══════════════════════════════════════════════ */
    function toggleEntreprises() {
        const cb = document.getElementById('entrepriseCheck');
        cb.checked = !cb.checked;
        document.getElementById('toggleSwitch').classList.toggle('on', cb.checked);
        relancer();
    }

    /* ══════ PERSISTENCE BUDGET — Sauvegarde dans localStorage ══════ */
    const budgetEl = document.getElementById('budgetInput');
    const saved = localStorage.getItem('ei_budget');
    if (saved) budgetEl.value = saved;
    // Formate la saisie en temps réel et la sauvegarde
    budgetEl.addEventListener('input', e => {
        const raw = e.target.value.replace(/\D/g, '');
        if (!raw) { e.target.value = ''; return; }
        e.target.value = new Intl.NumberFormat('fr-FR').format(parseInt(raw, 10));
        localStorage.setItem('ei_budget', e.target.value);
    });

    /* ══════════════════════════════════════════════
       calcReco — Calcule la recommandation pour un bien Construction/Vente (tab 1)
       Logique : croise la plus-value et le cashflow locatif pour donner un verdict
       - Si les deux sont négatifs → À éviter
       - Si seul le cashflow est positif → Rente uniquement
       - Sinon → classe selon la vitesse d'amortissement (ROI en jours)
    ══════════════════════════════════════════════ */
    function calcReco(o) {
        const g = o.gainUnitaire, cf = o.brut.gainNetLocatif, roi = o.joiROI;
        if (g <= 0 && cf <= 0) return { label:'🚫 À éviter', cls:'c-red', action:'eviter', titre:'Non rentable', desc:`Perte à la revente (${fmt(g)} €) et cashflow négatif (${fmt(cf)} €/j).` };
        if (cf <= 0 && g > 0)  return { label:'🚀 Revente seule', cls:'c-blue', action:'revente', titre:'Achat-revente uniquement', desc:`Revente profitable (+${fmt(g)} €) mais loyer insuffisant (${fmt(cf)} €/j).` };
        const roiStr = (roi===Infinity||isNaN(roi)) ? '∞' : roi.toFixed(0);
        if (roi <= 1000) return { label:'💰 Rente optimale', cls:'c-green', action:'rente', titre:'Excellente opportunité', desc:`ROI en ${roiStr} j. Chaque unité rapporte ${fmt(cf)} €/j net ensuite.` };
        if (roi <= 2500) return { label:'⚖️ Mixte', cls:'c-violet', action:'mixte', titre:'Stratégie mixte', desc:`ROI en ${roiStr} j. Location long terme ou revente (+${fmt(g)} €).` };
        return { label:'🏗️ Revente conseillée', cls:'c-orange', action:'revente_ok', titre:'Plus-value solide', desc:`ROI locatif très long (${roiStr} j). Plus-value +${fmt(g)} € plus intéressante.` };
    }

    /* ══════════════════════════════════════════════
       calcRecoLocation — Calcule la recommandation pour Achat/Location (tab 2)
       Classe selon la vitesse d'amortissement (prix d'achat ÷ cashflow net)
       - Cashflow négatif → À éviter
       - ROI ≤ 500 j → Top
       - ROI ≤ 1500 j → Bon placement
       - ROI ≤ 3000 j → Long terme
       - Au-delà → Très lent
    ══════════════════════════════════════════════ */
    function calcRecoLocation(o) {
        const cf = o.cfNet, roi = o.roiJours;
        if (cf <= 0) return { label:'🚫 Cashflow négatif', cls:'c-red', action:'eviter', titre:'Charges > Loyer', desc:`Ce bien coûte ${fmt(-cf)} €/j nets après charges et impôts. Ne pas acheter pour louer.` };
        if (roi <= 500)  return { label:'🌟 Rentabilité top', cls:'c-green', action:'top', titre:'Amortissement ultra-rapide', desc:`Rentable en seulement ${fmtD(roi)}. Rendement exceptionnel.` };
        if (roi <= 1500) return { label:'✅ Bon placement', cls:'c-teal', action:'bon', titre:'Investissement sain', desc:`Rentable en ${fmtD(roi)}. Cashflow de ${fmt(cf)} €/j après amortissement.` };
        if (roi <= 3000) return { label:'⏳ Long terme', cls:'c-violet', action:'long', titre:'Patience requise', desc:`Amortissement en ${fmtD(roi)}. Convient pour horizon très long.` };
        return { label:'⚠️ Très long', cls:'c-orange', action:'lent', titre:'Retour sur investissement lent', desc:`Amortissement en ${fmtD(roi)} — très long. Comparer à la revente.` };
    }

    /* ══════════════════════════════════════════════
       analyser — Fonction principale de calcul (appelée au clic sur →)
       1. Lit le capital et les préférences depuis le DOM
       2. Télécharge les données de l'API (ou utilise le cache)
       3. Pour chaque bâtiment, calcule 3 stratégies :
          - Tab 1 : Construction + Revente
          - Tab 2 : Achat direct + Location
          - Tab 3 : Construction + Location (score = plusvalue_nette / nb_jours_chantier)
       4. Trie et affiche les résultats dans chaque onglet
    ══════════════════════════════════════════════ */
    async function analyser(resetStatus = true) {
        const raw    = document.getElementById('budgetInput').value.replace(/[\s\u202f]/g, '');
        const budget = parseFloat(raw);
        const inclEnt = document.getElementById('entrepriseCheck').checked;

        if (isNaN(budget) || budget <= 0) {
            document.getElementById('statusTexte').textContent = '⚠️ Veuillez entrer un capital valide.';
            return;
        }

        // Active les spinners et vide les listes
        ['1','2','3'].forEach(n => {
            document.getElementById('spinner'+n).classList.add('on');
            document.getElementById('barResults'+n).classList.remove('visible');
            document.getElementById('cardsList'+n) && (document.getElementById('cardsList'+n).innerHTML = '');
        });
        document.getElementById('stratGrid').innerHTML = '';
        document.getElementById('statusTexte').textContent   = 'Calcul en cours…';
        document.getElementById('statusTexte2').textContent  = 'Calcul en cours…';
        document.getElementById('statusTexte3').textContent  = 'Calcul en cours…';
        document.getElementById('btnCalc').classList.add('loading');

        try {
            // Charge les données API si pas déjà en cache
            if (!dataCache) {
                const res = await fetch(API);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                dataCache = await res.json();
            }

            const terrains = dataCache.batiments_terrain || [];
            let bats = [];
            if (dataCache.batiments_perso)      dataCache.batiments_perso.forEach(b     => { b.cat = '🏡 Personnel'; bats.push(b); });
            if (inclEnt && dataCache.batiments_entreprise) dataCache.batiments_entreprise.forEach(b => { b.cat = '🏢 Entreprise'; bats.push(b); });

            opps1 = []; opps2 = []; opps3 = [];

            bats.forEach((b, idx) => {
                const pConst  = parseFloat(b.construction) || 0;
                const vFinale = parseFloat(b.valeur)       || 0;
                const loyer   = parseFloat(b.loyer)        || 0;
                const charge  = parseFloat(b.charge)       || 0;
                const impot   = parseFloat(b.impot)        || 0;
                const cfNet   = loyer - charge - impot;  // Cashflow locatif net journalier

                /* ── STRATÉGIE 1 : CONSTRUCTION + REVENTE ── */
                if (pConst > 0) {
                    const spec    = SPECS[b.nom] || { t: '0', tr: '' };
                    const tConst  = parseInt(spec.t) || 0;   // Durée chantier en jours
                    const trReq   = spec.tr || '';
                    let terrain   = null;
                    let selecteur = true;

                    // Terrain fixe ou sélectionnable
                    if (trReq.trim()) {
                        terrain = terrains.find(t => t.nom.toLowerCase().trim() === trReq.toLowerCase().trim());
                        if (terrain) selecteur = false;
                    }
                    if (!terrain) {
                        if (choixTerrain[b.nom] === undefined) choixTerrain[b.nom] = 0;
                        terrain = terrains[choixTerrain[b.nom]] || terrains[0];
                    }

                    const pTerrain  = parseFloat(terrain?.valeur)  || 0;
                    const tCharge   = parseFloat(terrain?.charge)  || 0;
                    const tImpot    = parseFloat(terrain?.impot)   || 0;
                    // Déficit chantier = (charges+impôts du terrain) × durée chantier
                    const deficit   = (tCharge + tImpot) * tConst;
                    // Coût total = terrain + construction + taxe fixe 1000€ + déficit chantier
                    const coutTotal = pTerrain + pConst + 1000 + deficit;
                    const gainUnit  = vFinale - coutTotal;        // Plus-value nette à la revente
                    const qteMax    = Math.floor(budget / coutTotal);

                    if (qteMax > 0) {
                        const gainTotalCumul = gainUnit * qteMax;
                        const cfCumul        = cfNet * qteMax;
                        let joiROI = Infinity, roiStr = '∞';
                        // ROI locatif = coût total ÷ cashflow journalier (si positif)
                        if (cfNet > 0) { joiROI = coutTotal / cfNet; roiStr = joiROI.toFixed(1) + ' j'; }
                        const pTer = ((pTerrain/coutTotal)*100).toFixed(1);
                        const pCon = ((pConst/coutTotal)*100).toFixed(1);
                        const pDef = ((deficit/coutTotal)*100).toFixed(1);
                        const pMar = ((gainUnit/coutTotal)*100).toFixed(1);
                        const pRnd = cfNet > 0 ? ((cfNet/coutTotal)*100).toFixed(2) : '0.00';
                        const o1 = {
                            id: `opp1-${idx}`, nom: b.nom, cat: b.cat,
                            coutTotal, deficit, qteMax, gainTotalCumul, cfCumul,
                            joiROI, roiStr, tConst,
                            tConstStr: tConst > 0 ? `${tConst} jours` : 'Immédiat',
                            terrainReq: trReq, selecteur, terrain, gainUnitaire: gainUnit,
                            pcts: { ter:pTer, con:pCon, def:pDef, mar:pMar, rnd:pRnd },
                            brut: { pTerrain, pConst, vFinale, loyer, charge, impot, gainNetLocatif: cfNet, tCharge, tImpot }
                        };
                        o1.reco = calcReco(o1);
                        opps1.push(o1);
                    }
                }

                /* ── STRATÉGIE 2 : ACHAT DIRECT + LOCATION ── */
                if (vFinale > 0) {
                    const qteMax2 = Math.floor(budget / vFinale);
                    if (qteMax2 > 0) {
                        // ROI = prix d'achat ÷ cashflow journalier
                        let roiJours = Infinity;
                        if (cfNet > 0) roiJours = vFinale / cfNet;
                        // Rendement journalier en % du prix d'achat
                        const rendJour = cfNet > 0 ? (cfNet / vFinale * 100) : 0;
                        const o2 = {
                            id: `opp2-${idx}`, nom: b.nom, cat: b.cat,
                            prixAchat: vFinale, cfNet, qteMax: qteMax2,
                            roiJours, rendJour,
                            cfCumul: cfNet * qteMax2,
                            brut: { vFinale, loyer, charge, impot }
                        };
                        o2.reco = calcRecoLocation(o2);
                        opps2.push(o2);
                    }
                }
            });

            /* ── STRATÉGIE 3 : CONSTRUCTION + LOCATION ──
               Pour chaque bâtiment qui peut être construit ET loué :
               Score = plus-value nette ÷ nombre de jours de construction
               (mesure l'efficacité : combien de € de plus-value par jour d'attente)
               Si tConst = 0 (immédiat), on utilise 1 pour éviter la division par zéro
            ── */
            opps1.forEach(o1 => {
                const o2 = opps2.find(x => x.nom === o1.nom);
                if (!o2) return;  // Pas de données locatives pour ce bâtiment

                const joursChantier = o1.tConst > 0 ? o1.tConst : 1;
                // Score Construction/Location = plus-value nette / jours de chantier
                // Plus ce score est élevé, plus la construction est "rentable par jour d'attente"
                const scoreCL = o1.gainUnitaire > 0 ? (o1.gainUnitaire / joursChantier) : -1;

                // Score Construction/Vente = % de retour sur investissement
                const scoreCon = o1.gainUnitaire > 0 ? (o1.gainUnitaire / o1.coutTotal) : -1;

                // Score Achat/Location = rendement journalier (cashflow / prix d'achat)
                const scoreLoc = o2.cfNet > 0 ? (o2.cfNet / o2.prixAchat) : -1;

                opps3.push({
                    nom: o1.nom, cat: o1.cat,
                    o1, o2,
                    scoreCon,     // Score pour Construction/Vente
                    scoreLoc,     // Score pour Achat/Location
                    scoreCL,      // Score pour Construction/Location (€ plus-value / jour chantier)
                    joursChantier
                });
            });

            // Tri et affichage
            trierOpp(1); afficherCards(1);
            trierOpp(2); afficherCards(2);
            afficherClassement();  // Tab 3 : classement en 3 colonnes

            document.getElementById('statusTexte').textContent  = `${opps1.length} opportunités — Appuyez pour le détail.`;
            document.getElementById('statusTexte2').textContent = `${opps2.length} biens — Amortissement incluant charges & impôts.`;
            document.getElementById('statusTexte3').textContent = `${opps3.length} bâtiments comparés — Classement par rentabilité.`;

        } catch(err) {
            console.error(err);
            ['statusTexte','statusTexte2','statusTexte3'].forEach(id => {
                document.getElementById(id).textContent = '⚠️ Erreur réseau — vérifiez votre connexion.';
            });
        } finally {
            ['1','2','3'].forEach(n => document.getElementById('spinner'+n).classList.remove('on'));
            document.getElementById('btnCalc').classList.remove('loading');
        }
    }

    /* ══════════════════════════════════════════════
       trierOpp — Trie les opportunités d'un tab donné
       - Tab 1 : trie selon l'objectif sélectionné (plus-value, rente, roi)
         ou selon les critères performance/roi/quantite/nom
       - Tab 2 : trie selon roi/cashflow/quantite/nom
       Le sens de tri (triSens) est inversé à chaque clic sur la même colonne
    ══════════════════════════════════════════════ */
    function trierOpp(tab) {
        const strat = document.getElementById('strategieSelect').value;
        if (tab === 1) {
            opps1.sort((a, b) => {
                let va, vb;
                switch(triActuel[1]) {
                    case 'performance':
                        if (strat === 'plusvalue') { va=a.gainTotalCumul; vb=b.gainTotalCumul; }
                        else if (strat === 'cashflow') { va=a.cfCumul; vb=b.cfCumul; }
                        else { va=-a.joiROI; vb=-b.joiROI; }
                        break;
                    case 'roi':      va=-a.joiROI;       vb=-b.joiROI;      break;
                    case 'quantite': va= a.qteMax;        vb= b.qteMax;      break;
                    case 'nom':      return triSens[1] * a.nom.localeCompare(b.nom);
                }
                return triSens[1] * (va - vb);
            });
        } else if (tab === 2) {
            opps2.sort((a, b) => {
                let va, vb;
                switch(triActuel[2]) {
                    case 'roi':      va=-a.roiJours;   vb=-b.roiJours;  break;
                    case 'cashflow': va= a.cfNet;       vb= b.cfNet;     break;
                    case 'quantite': va= a.qteMax;      vb= b.qteMax;    break;
                    case 'nom':      return triSens[2] * a.nom.localeCompare(b.nom);
                }
                return triSens[2] * (va - vb);
            });
        }
    }

    /* ══════════════════════════════════════════════
       afficherClassement — Construit le tab 3 : 3 colonnes indépendantes
       Chaque colonne est triée par son propre score décroissant :
       - Colonne 1 "Achat/Location"         : scoreLoc  (cashflow / prix achat)
       - Colonne 2 "Construction/Vente"     : scoreCon  (plusvalue / coutTotal)
       - Colonne 3 "Construction/Location"  : scoreCL   (plusvalue / jours chantier)
       Les items à score négatif sont cachés derrière un bouton "Voir non-rentables"
    ══════════════════════════════════════════════ */
    function afficherClassement() {
        const grid = document.getElementById('stratGrid');
        grid.innerHTML = '';

        const terme = (document.getElementById('filtreNom3')?.value || '').toLowerCase().trim();
        let base = terme ? opps3.filter(c => c.nom.toLowerCase().includes(terme)) : opps3;

        // Définition des 3 colonnes avec leur score et leur config d'affichage
        const colonnes = [
            {
                key: 'achat-location',
                icon: '🏠',
                titre: 'Achat / Location',
                subtitle: 'Rentabilité locative',
                scoreKey: 'scoreLoc',
                scoreLabel: 'Rendement',
                scoreSuffix: '%/j',   // Unité du score affiché
                scoreMultiplier: 100, // Multiplier pour l'affichage (on affiche en %)
                valueKey: item => item.o2.cfNet,
                valueLabel: 'Cashflow/j',
                valueSuffix: ' €/j',
                valueSigned: true,
                headerCls: ''
            },
            {
                key: 'construction-vente',
                icon: '🏗️',
                titre: 'Construction / Vente',
                subtitle: 'Plus-value nette',
                scoreKey: 'scoreCon',
                scoreLabel: 'Retour',
                scoreSuffix: '%',
                scoreMultiplier: 100,
                valueKey: item => item.o1.gainUnitaire,
                valueLabel: 'Plus-value',
                valueSuffix: ' €',
                valueSigned: true,
                headerCls: ''
            },
            {
                key: 'construction-location',
                icon: '🏘️',
                titre: 'Construction / Location',
                subtitle: '€ plus-value / jour chantier',
                scoreKey: 'scoreCL',
                scoreLabel: '€/jour chantier',
                scoreSuffix: ' €/j',
                scoreMultiplier: 1,   // Pas de conversion, déjà en €/jour
                valueKey: item => item.o1.gainUnitaire,
                valueLabel: 'Plus-value',
                valueSuffix: ' €',
                valueSigned: true,
                headerCls: ''
            }
        ];

        colonnes.forEach(col => {
            const colEl = document.createElement('div');
            colEl.className = 'strat-col';

            // En-tête de colonne collant
            const header = document.createElement('div');
            header.className = 'strat-col-header';
            header.innerHTML = `
                <span class="strat-icon">${col.icon}</span>
                <div class="strat-title">${col.titre}</div>
                <div class="strat-subtitle">${col.subtitle}</div>`;
            colEl.appendChild(header);

            // Trier les items de cette colonne par son score (décroissant)
            const sorted = [...base].sort((a, b) => b[col.scoreKey] - a[col.scoreKey]);
            const rentables  = sorted.filter(item => item[col.scoreKey] > 0);
            const nonRentab  = sorted.filter(item => item[col.scoreKey] <= 0);

            if (sorted.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'Aucun résultat';
                colEl.appendChild(empty);
            } else {
                rentables.forEach((item, i) => {
                    colEl.appendChild(creerRankCard(item, col, i));
                });

                // Bouton pour afficher les non-rentables
                if (nonRentab.length > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-toggle-pertes';
                    btn.textContent = `▼ ${nonRentab.length} non-rentables`;
                    btn.onclick = () => {
                        btn.style.display = 'none';
                        nonRentab.forEach((item, i) => {
                            colEl.insertBefore(creerRankCard(item, col, rentables.length + i), null);
                        });
                    };
                    colEl.appendChild(btn);
                }
            }

            grid.appendChild(colEl);
        });

        // Afficher la barre de recherche
        document.getElementById('barResults3').classList.add('visible');
        const nb = opps3.filter(c => c.scoreLoc > 0 || c.scoreCon > 0 || c.scoreCL > 0).length;
        document.getElementById('cptResults3').innerHTML = terme
            ? `<b>${base.length}</b>/${opps3.length}`
            : `<b>${nb}</b> rentables`;
    }

    /* ══════════════════════════════════════════════
       creerRankCard — Crée une mini-carte pour le classement tab 3
       - item   : l'objet opps3 du bâtiment
       - col    : la configuration de la colonne (scoreKey, labels, etc.)
       - rang   : position 0-based dans le classement de cette colonne
       Affiche : rang, nom, score principal, valeur secondaire, badge de reco
       Au clic, ouvre la modal correspondant à la stratégie de la colonne
    ══════════════════════════════════════════════ */
    function creerRankCard(item, col, rang) {
        const card = document.createElement('div');
        card.className = 'rank-card' + (rang < 3 ? ' rank-top-3' : '');
        card.style.animationDelay = `${Math.min(rang * 0.03, 0.3)}s`;

        // Au clic, ouvre la modal adaptée à la stratégie
        card.onclick = () => {
            modalStratType = col.key;
            if (col.key === 'achat-location') {
                ouvrirModal2(item.o2);
            } else if (col.key === 'construction-vente') {
                ouvrirModal1(item.o1);
            } else {
                ouvrirModalCL(item);  // Construction + Location
            }
        };

        const score   = item[col.scoreKey];
        const valeur  = col.valueKey(item);
        const isNeg   = score <= 0;

        // Formater le score selon la colonne
        let scoreStr;
        if (score <= 0) {
            scoreStr = '—';
        } else if (col.scoreMultiplier === 100) {
            scoreStr = (score * 100).toFixed(3) + col.scoreSuffix;
        } else {
            scoreStr = fmt(score) + col.scoreSuffix;
        }

        // Formater la valeur secondaire (plus-value ou cashflow)
        const valStr = col.valueSigned ? fmtS(valeur, col.valueSuffix) : fmt(valeur) + col.valueSuffix;
        const valCls = valeur >= 0 ? 't-green' : 't-red';

        // Badge de recommandation selon la colonne
        let recoBadge = '';
        if (col.key === 'achat-location' && item.o2.reco) {
            recoBadge = `<span class="rank-card-badge ${item.o2.reco.cls}">${item.o2.reco.label}</span>`;
        } else if (item.o1.reco) {
            recoBadge = `<span class="rank-card-badge ${item.o1.reco.cls}">${item.o1.reco.label}</span>`;
        }

        card.innerHTML = `
            <div class="rank-num">#${rang+1}</div>
            <div class="rank-card-name">${item.nom}</div>
            <div class="rank-card-score ${isNeg ? 't-red' : 't-green'}">${scoreStr}</div>
            <div class="rank-card-sub ${valCls}">${col.valueLabel}: ${valStr}</div>
            ${recoBadge}`;

        return card;
    }

    /* ══════════════════════════════════════════════
       creerCard1 — Crée une carte pour le tab 1 (Construction/Vente)
       Affiche le nom, la catégorie, le délai, et 4 métriques :
       - La performance principale (plus-value, rente ou ROI selon l'objectif)
       - La quantité max achetable avec le budget
       - Le coût unitaire
       - Le ROI locatif
    ══════════════════════════════════════════════ */
    function creerCard1(o, rang) {
        const card = document.createElement('div');
        const estTop = rang < 3;
        card.className = 'card ' + o.reco.cls + (estTop ? ' card-top' : '');
        card.style.animationDelay = `${Math.min(rang * 0.04, 0.4)}s`;
        card.onclick = () => ouvrirModal1(o);
        const strat = document.getElementById('strategieSelect').value;
        let perf = '';
        if (strat === 'plusvalue') {
            const cls = o.gainTotalCumul >= 0 ? 't-green' : 't-red';
            perf = `<div class="metric-chip"><div class="val ${cls}">${fmtS(o.gainTotalCumul,' €')}</div><div class="lbl">Plus-value totale</div></div>`;
        } else if (strat === 'cashflow') {
            const cls = o.cfCumul >= 0 ? 't-green' : 't-red';
            perf = `<div class="metric-chip"><div class="val ${cls}">${fmtS(o.cfCumul,' €/j')}</div><div class="lbl">Rente nette</div></div>`;
        } else {
            perf = `<div class="metric-chip"><div class="val t-orange">${o.roiStr}</div><div class="lbl">ROI</div></div>`;
        }
        card.innerHTML = `
            <div class="card-main">
                ${estTop ? `<div class="top-rank">#${rang+1}</div>` : ''}
                <div class="card-name-row">
                    <div>
                        <div class="card-name">${o.nom}</div>
                        <div class="card-type">${o.cat} · ${o.tConstStr}</div>
                    </div>
                    <span class="card-badge ${o.reco.cls}">${o.reco.label}</span>
                </div>
                <div class="card-metrics">
                    ${perf}
                    <div class="metric-chip"><div class="val t-blue">×${o.qteMax}</div><div class="lbl">Max achet.</div></div>
                    <div class="metric-chip"><div class="val">${fmt(o.coutTotal)} €</div><div class="lbl">Coût/unité</div></div>
                    <div class="metric-chip"><div class="val t-orange">${o.roiStr}</div><div class="lbl">ROI loc.</div></div>
                </div>
            </div>`;
        return card;
    }

    /* ══════════════════════════════════════════════
       creerCard2 — Crée une carte pour le tab 2 (Achat/Location)
       Affiche : amortissement, cashflow, quantité max, rendement journalier
    ══════════════════════════════════════════════ */
    function creerCard2(o, rang) {
        const card = document.createElement('div');
        const estTop = rang < 3;
        card.className = 'card ' + o.reco.cls + (estTop ? ' card-top' : '');
        card.style.animationDelay = `${Math.min(rang * 0.04, 0.4)}s`;
        card.onclick = () => ouvrirModal2(o);
        const cfCls  = o.cfNet >= 0 ? 't-green' : 't-red';
        const roiStr = o.roiJours === Infinity ? '∞' : fmt(o.roiJours) + ' j';
        const rendStr = o.cfNet > 0 ? o.rendJour.toFixed(3) + '%/j' : '—';
        card.innerHTML = `
            <div class="card-main">
                ${estTop ? `<div class="top-rank">#${rang+1}</div>` : ''}
                <div class="card-name-row">
                    <div>
                        <div class="card-name">${o.nom}</div>
                        <div class="card-type">${o.cat} · Achat direct</div>
                    </div>
                    <span class="card-badge ${o.reco.cls}">${o.reco.label}</span>
                </div>
                <div class="card-metrics">
                    <div class="metric-chip"><div class="val t-orange">${roiStr}</div><div class="lbl">Amortiss.</div></div>
                    <div class="metric-chip"><div class="val ${cfCls}">${fmtS(o.cfNet,' €/j')}</div><div class="lbl">Cashflow/j</div></div>
                    <div class="metric-chip"><div class="val t-blue">×${o.qteMax}</div><div class="lbl">Max achet.</div></div>
                    <div class="metric-chip"><div class="val t-teal">${rendStr}</div><div class="lbl">Rendement</div></div>
                </div>
            </div>`;
        return card;
    }

    /* ══════════════════════════════════════════════
       afficherCards — Affiche la liste des cards pour le tab 1 ou 2
       - Filtre par terme de recherche si présent
       - Sépare rentables et non-rentables
       - Affiche un TOP 3 + le reste + un bouton pour les non-rentables
    ══════════════════════════════════════════════ */
    function afficherCards(tab) {
        const liste = document.getElementById('cardsList' + tab);
        const terme = (document.getElementById('filtreNom' + tab)?.value || '').toLowerCase().trim();

        if (tab === 1) {
            let base       = terme ? opps1.filter(o => o.nom.toLowerCase().includes(terme)) : opps1;
            const rentables  = base.filter(o => o.reco.action !== 'eviter');
            const pertesSech = base.filter(o => o.reco.action === 'eviter');
            liste.innerHTML = '';
            if (base.length === 0) { liste.innerHTML = `<div class="empty-state">Aucun bâtiment trouvé.</div>`; return; }
            const strat = document.getElementById('strategieSelect').value;
            if (rentables.slice(0,3).length > 0) {
                const sep = document.createElement('div'); sep.className='rank-sep';
                sep.innerHTML = `🏆 TOP 3 — ${strat==='plusvalue'?'Plus-value':strat==='cashflow'?'Rente':'ROI'}`;
                liste.appendChild(sep);
                rentables.slice(0,3).forEach((o,i) => liste.appendChild(creerCard1(o, i)));
            }
            if (rentables.slice(3).length > 0) {
                const sep2 = document.createElement('div'); sep2.className='rank-sep';
                sep2.textContent = `Autres (${rentables.slice(3).length})`;
                liste.appendChild(sep2);
                rentables.slice(3).forEach((o,i) => liste.appendChild(creerCard1(o, i+3)));
            }
            if (pertesSech.length > 0) {
                const btn = document.createElement('button'); btn.className='btn-toggle-pertes';
                btn.textContent = afficherTout[1] ? `▲ Masquer les ${pertesSech.length} non-rentables` : `▼ Voir les ${pertesSech.length} non-rentables`;
                btn.onclick = () => { afficherTout[1] = !afficherTout[1]; afficherCards(1); };
                liste.appendChild(btn);
                if (afficherTout[1]) pertesSech.forEach((o,i) => liste.appendChild(creerCard1(o, rentables.length+i)));
            }
            document.getElementById('barResults1').classList.add('visible');
            document.getElementById(`t1-pill-${triActuel[1]}`) && document.getElementById(`t1-pill-${triActuel[1]}`).classList.add('active');
            document.getElementById('cptResults1').innerHTML = terme
                ? `<b>${base.length}</b>/${opps1.length}`
                : `<b>${rentables.length}</b> rentables · <span style="color:var(--text-3)">${pertesSech.length} masquées</span>`;
        }
        else if (tab === 2) {
            let base    = terme ? opps2.filter(o => o.nom.toLowerCase().includes(terme)) : opps2;
            const bons    = base.filter(o => o.reco.action !== 'eviter');
            const mauvais = base.filter(o => o.reco.action === 'eviter');
            liste.innerHTML = '';
            if (base.length === 0) { liste.innerHTML = `<div class="empty-state">Aucun bien trouvé.</div>`; return; }
            if (bons.slice(0,3).length > 0) {
                const sep = document.createElement('div'); sep.className='rank-sep';
                sep.innerHTML = `🏆 TOP 3 — Meilleure rentabilité locative`;
                liste.appendChild(sep);
                bons.slice(0,3).forEach((o,i) => liste.appendChild(creerCard2(o, i)));
            }
            if (bons.slice(3).length > 0) {
                const sep2 = document.createElement('div'); sep2.className='rank-sep';
                sep2.textContent = `Autres biens (${bons.slice(3).length})`;
                liste.appendChild(sep2);
                bons.slice(3).forEach((o,i) => liste.appendChild(creerCard2(o, i+3)));
            }
            if (mauvais.length > 0) {
                const btn = document.createElement('button'); btn.className='btn-toggle-pertes';
                btn.textContent = afficherTout[2] ? `▲ Masquer les ${mauvais.length} cashflow négatif` : `▼ Voir les ${mauvais.length} biens à cashflow négatif`;
                btn.onclick = () => { afficherTout[2] = !afficherTout[2]; afficherCards(2); };
                liste.appendChild(btn);
                if (afficherTout[2]) mauvais.forEach((o,i) => liste.appendChild(creerCard2(o, bons.length+i)));
            }
            document.getElementById('barResults2').classList.add('visible');
            document.getElementById('cptResults2').innerHTML = terme
                ? `<b>${base.length}</b>/${opps2.length}`
                : `<b>${bons.length}</b> rentables · <span style="color:var(--text-3)">${mauvais.length} négatives</span>`;
        }
    }

    /* ══════════════════════════════════════════════
       filtrer — Rafraîchit l'affichage d'un tab selon le terme de recherche
       Appelé à chaque saisie dans la barre de recherche
    ══════════════════════════════════════════════ */
    function filtrer(tab) {
        if (tab === 3) afficherClassement();
        else afficherCards(tab);
    }

    /* ══════════════════════════════════════════════
       relancer — Relance l'analyse si des données existent déjà
       Utile quand on change l'objectif dans le select sans cliquer sur →
    ══════════════════════════════════════════════ */
    function relancer() {
        if (opps1.length > 0 || opps2.length > 0) analyser(false);
    }

    /* ══════════════════════════════════════════════
       ouvrirModal1 — Modal détaillée pour Construction/Vente
       Affiche : recommandation, terrain sélectionnable, KPI, amortissement,
       tableau comptable complet (coûts + revente + location)
    ══════════════════════════════════════════════ */
    function ouvrirModal1(o) {
        oppOuverte = o;
        document.getElementById('modalTitre').textContent    = o.nom;
        document.getElementById('modalSousTitre').textContent = `${o.cat} · ${o.tConstStr} · Construire & Revendre`;
        const body    = document.getElementById('modalBody');
        const terrains = dataCache?.batiments_terrain || [];
        const gUnit   = o.gainUnitaire;
        const clsG    = gUnit >= 0 ? 't-green' : 't-red';
        const sigG    = gUnit >= 0 ? '+' : '';
        let terrainHTML = '';
        if (o.selecteur) {
            let opts = terrains.map((t, i) => `<option value="${i}" ${t.nom===o.terrain.nom?'selected':''}>${t.nom} — ${fmt(t.valeur)} €</option>`).join('');
            terrainHTML = `<div class="terrain-block"><label>Terrain (modifiable)</label><div class="select-wrap"><select onchange="changerTerrain('${o.nom.replace(/'/g,"\\'")}', this.value)">${opts}</select></div></div>`;
        } else {
            terrainHTML = `<div style="margin-bottom:12px;"><div class="section-title">Terrain</div><span class="badge-terrain-fixe">🔒 ${o.terrain.nom} — ${fmt(o.brut.pTerrain)} €</span></div>`;
        }
        const roiPct = o.joiROI===Infinity ? 0 : Math.min(100, Math.max(2, 100 - (o.joiROI/3000)*100));
        const cfCls  = o.brut.gainNetLocatif >= 0 ? 't-green' : 't-red';
        body.innerHTML = `
        <div class="reco-block ${o.reco.cls}">
            <div class="reco-title">${o.reco.label} — ${o.reco.titre}</div>
            <div class="reco-desc">${o.reco.desc}</div>
        </div>
        ${terrainHTML}
        <div class="section">
            <div class="section-title">Résumé chiffré</div>
            <div class="kpi-grid">
                <div class="kpi"><div class="kpi-val">${fmt(o.coutTotal)} €</div><div class="kpi-lbl">Coût / unité</div></div>
                <div class="kpi"><div class="kpi-val t-blue">×${o.qteMax}</div><div class="kpi-lbl">Max achetables</div></div>
                <div class="kpi"><div class="kpi-val ${clsG}">${sigG}${fmt(gUnit)} €</div><div class="kpi-lbl">Plus-value/unité</div></div>
                <div class="kpi"><div class="kpi-val ${cfCls}">${fmtS(o.brut.gainNetLocatif,' €/j')}</div><div class="kpi-lbl">Cashflow net</div></div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Amortissement locatif</div>
            <div class="roi-bar-wrap">
                <div class="roi-bar-label"><span class="name">Seuil d'amortissement</span><span class="val">${o.roiStr}</span></div>
                <div class="roi-bar"><div class="roi-bar-fill" style="width:${roiPct}%"></div></div>
                <div class="roi-formula">${fmt(o.coutTotal)} € ÷ ${fmt(o.brut.gainNetLocatif)} €/j = ${o.roiStr}</div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Détail comptable — ×${o.qteMax} unités</div>
            <table class="fin-table">
                <thead><tr><th>Poste</th><th>Unitaire</th><th>Total (×${o.qteMax})</th></tr></thead>
                <tbody>
                    <tr class="tr-section"><td colspan="3">1 · COÛTS DE LANCEMENT</td></tr>
                    <tr><td>Terrain</td><td>${fmt(o.brut.pTerrain)} € <span class="pct-badge">${o.pcts.ter}%</span></td><td>${fmt(o.brut.pTerrain*o.qteMax)} €</td></tr>
                    <tr><td>Construction</td><td>${fmt(o.brut.pConst)} € <span class="pct-badge">${o.pcts.con}%</span></td><td>${fmt(o.brut.pConst*o.qteMax)} €</td></tr>
                    <tr><td>Taxe fixe</td><td>1 000 € <span class="pct-badge">${((1000/o.coutTotal)*100).toFixed(1)}%</span></td><td>${fmt(1000*o.qteMax)} €</td></tr>
                    <tr><td style="color:var(--orange)">Déficit chantier</td><td style="color:var(--orange)">${fmt(o.deficit)} € <span class="pct-badge">${o.pcts.def}%</span></td><td style="color:var(--orange)">${fmt(o.deficit*o.qteMax)} €</td></tr>
                    <tr class="tr-total"><td>Coût global</td><td><strong>${fmt(o.coutTotal)} €</strong></td><td><strong>${fmt(o.coutTotal*o.qteMax)} €</strong></td></tr>
                    <tr class="tr-section"><td colspan="3">2 · REVENTE</td></tr>
                    <tr><td>Valeur d'expertise</td><td>${fmt(o.brut.vFinale)} €</td><td>${fmt(o.brut.vFinale*o.qteMax)} €</td></tr>
                    <tr class="${gUnit>=0?'tr-gain':'tr-loss'}"><td>Plus-value nette</td><td><strong class="${clsG}">${sigG}${fmt(gUnit)} €</strong> <span class="pct-badge">${sigG}${o.pcts.mar}%</span></td><td><strong class="${clsG}">${sigG}${fmt(o.gainTotalCumul)} €</strong></td></tr>
                    <tr class="tr-section"><td colspan="3">3 · LOCATION (par jour)</td></tr>
                    <tr><td>Loyer brut</td><td>${fmt(o.brut.loyer)} €/j</td><td>${fmt(o.brut.loyer*o.qteMax)} €/j</td></tr>
                    <tr><td>Charges</td><td>−${fmt(o.brut.charge)} €/j</td><td>−${fmt(o.brut.charge*o.qteMax)} €/j</td></tr>
                    <tr><td>Impôts</td><td>−${fmt(o.brut.impot)} €/j</td><td>−${fmt(o.brut.impot*o.qteMax)} €/j</td></tr>
                    <tr class="tr-total"><td>Cashflow net</td><td><span class="${cfCls}">${fmtS(o.brut.gainNetLocatif,' €/j')}</span></td><td><span class="${cfCls}">${fmtS(o.brut.gainNetLocatif*o.qteMax,' €/j')}</span></td></tr>
                </tbody>
            </table>
        </div>`;
        document.getElementById('modalOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    /* ══════════════════════════════════════════════
       ouvrirModal2 — Modal détaillée pour Achat/Location
       Affiche : recommandation, KPI (prix/quantité/cashflow/rendement),
       barre d'amortissement, tableau charges + projection
    ══════════════════════════════════════════════ */
    function ouvrirModal2(o) {
        oppOuverte = o;
        document.getElementById('modalTitre').textContent    = o.nom;
        document.getElementById('modalSousTitre').textContent = `${o.cat} · Acheter & Louer`;
        const body   = document.getElementById('modalBody');
        const cfCls  = o.cfNet >= 0 ? 't-green' : 't-red';
        const roiStr = o.roiJours === Infinity ? '∞' : fmt(o.roiJours) + ' jours';
        const roiPct = o.roiJours === Infinity ? 0 : Math.min(100, Math.max(2, 100 - (o.roiJours / 3000) * 100));
        const rendAnnuel = o.cfNet > 0 ? (o.rendJour * 365).toFixed(1) + '%' : '—';
        body.innerHTML = `
        <div class="reco-block ${o.reco.cls}">
            <div class="reco-title">${o.reco.label} — ${o.reco.titre}</div>
            <div class="reco-desc">${o.reco.desc}</div>
        </div>
        <div class="section">
            <div class="section-title">Résumé chiffré</div>
            <div class="kpi-grid">
                <div class="kpi"><div class="kpi-val">${fmt(o.prixAchat)} €</div><div class="kpi-lbl">Prix d'achat</div></div>
                <div class="kpi"><div class="kpi-val t-blue">×${o.qteMax}</div><div class="kpi-lbl">Max achetables</div></div>
                <div class="kpi"><div class="kpi-val ${cfCls}">${fmtS(o.cfNet,' €/j')}</div><div class="kpi-lbl">Cashflow net/j</div></div>
                <div class="kpi"><div class="kpi-val t-teal">${rendAnnuel}</div><div class="kpi-lbl">Rendement/an</div></div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Amortissement</div>
            <div class="roi-bar-wrap">
                <div class="roi-bar-label"><span class="name">Rentable en</span><span class="val">${roiStr}</span></div>
                <div class="roi-bar"><div class="roi-bar-fill" style="width:${roiPct}%"></div></div>
                <div class="roi-formula">${fmt(o.prixAchat)} € ÷ ${fmtS(o.cfNet,' €/j')} = ${roiStr}</div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Détail financier — ×${o.qteMax} biens</div>
            <table class="fin-table">
                <thead><tr><th>Poste</th><th>Unitaire</th><th>Total (×${o.qteMax})</th></tr></thead>
                <tbody>
                    <tr class="tr-section"><td colspan="3">INVESTISSEMENT</td></tr>
                    <tr><td>Prix d'achat</td><td>${fmt(o.prixAchat)} €</td><td>${fmt(o.prixAchat*o.qteMax)} €</td></tr>
                    <tr class="tr-section"><td colspan="3">REVENUS LOCATIFS (par jour)</td></tr>
                    <tr><td>Loyer brut</td><td>+${fmt(o.brut.loyer)} €/j</td><td>+${fmt(o.brut.loyer*o.qteMax)} €/j</td></tr>
                    <tr><td>Charges</td><td>−${fmt(o.brut.charge)} €/j</td><td>−${fmt(o.brut.charge*o.qteMax)} €/j</td></tr>
                    <tr><td>Impôts</td><td>−${fmt(o.brut.impot)} €/j</td><td>−${fmt(o.brut.impot*o.qteMax)} €/j</td></tr>
                    <tr class="${o.cfNet>=0?'tr-gain':'tr-loss'}">
                        <td>Cashflow net</td>
                        <td><span class="${cfCls}">${fmtS(o.cfNet,' €/j')}</span></td>
                        <td><span class="${cfCls}">${fmtS(o.cfNet*o.qteMax,' €/j')}</span></td>
                    </tr>
                    <tr class="tr-section"><td colspan="3">PROJECTION</td></tr>
                    <tr><td>Rentable en</td><td colspan="2" style="text-align:right; font-family:'DM Mono',monospace; font-weight:600; color:var(--orange)">${roiStr}</td></tr>
                    <tr><td>Après amortissement</td><td colspan="2" style="text-align:right; font-family:'DM Mono',monospace; color:var(--green)">${fmtS(o.cfNet*o.qteMax,' €/j')} net pur</td></tr>
                </tbody>
            </table>
        </div>`;
        document.getElementById('modalOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    /* ══════════════════════════════════════════════
       ouvrirModalCL — Modal détaillée pour Construction/Location
       Stratégie = construire le bien, puis le louer (pas le revendre)
       Affiche :
       - Score €/jour de chantier (plus-value nette / durée chantier)
       - KPI : coût total, plus-value, cashflow locatif, durée chantier
       - Tableau : coûts + plus-value + revenus locatifs
    ══════════════════════════════════════════════ */
    function ouvrirModalCL(item) {
        oppOuverte = item;
        const o1 = item.o1, o2 = item.o2;
        document.getElementById('modalTitre').textContent    = item.nom;
        document.getElementById('modalSousTitre').textContent = `${item.cat} · Construire & Louer`;
        const body      = document.getElementById('modalBody');
        const clsG      = o1.gainUnitaire >= 0 ? 't-green' : 't-red';
        const sigG      = o1.gainUnitaire >= 0 ? '+' : '';
        const cfCls     = o2.cfNet >= 0 ? 't-green' : 't-red';
        const scoreCL   = item.scoreCL > 0 ? fmt(item.scoreCL) + ' €/j chantier' : '—';
        const roiConst  = o2.cfNet > 0 ? fmtD(o1.coutTotal / o2.cfNet) : '∞';

        body.innerHTML = `
        <div class="reco-block ${o1.reco.cls}">
            <div class="reco-title">🏘️ Construire & Louer</div>
            <div class="reco-desc">
                Score d'efficacité : <strong>${scoreCL}</strong> — plus-value nette divisée par les jours de chantier (${item.joursChantier} j).
                Une fois construit, le bien génère <strong>${fmtS(o2.cfNet,' €/j')}</strong> de cashflow locatif net.
            </div>
        </div>
        <div class="section">
            <div class="section-title">Résumé chiffré</div>
            <div class="kpi-grid">
                <div class="kpi"><div class="kpi-val">${fmt(o1.coutTotal)} €</div><div class="kpi-lbl">Coût total</div></div>
                <div class="kpi"><div class="kpi-val ${clsG}">${sigG}${fmt(o1.gainUnitaire)} €</div><div class="kpi-lbl">Plus-value</div></div>
                <div class="kpi"><div class="kpi-val ${cfCls}">${fmtS(o2.cfNet,' €/j')}</div><div class="kpi-lbl">Cashflow net/j</div></div>
                <div class="kpi"><div class="kpi-val t-orange">${o1.tConstStr}</div><div class="kpi-lbl">Durée chantier</div></div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Amortissement locatif après construction</div>
            <div class="roi-bar-wrap">
                <div class="roi-bar-label">
                    <span class="name">Rentable en (depuis construction)</span>
                    <span class="val">${roiConst}</span>
                </div>
                <div class="roi-bar"><div class="roi-bar-fill" style="width:${o2.cfNet > 0 ? Math.min(100, Math.max(2, 100 - (o1.coutTotal/o2.cfNet/3000)*100)) : 2}%"></div></div>
                <div class="roi-formula">${fmt(o1.coutTotal)} € ÷ ${fmtS(o2.cfNet,' €/j')} = ${roiConst}</div>
            </div>
        </div>
        <div class="section">
            <div class="section-title">Détail comptable — ×${o1.qteMax} unités</div>
            <table class="fin-table">
                <thead><tr><th>Poste</th><th>Unitaire</th><th>Total (×${o1.qteMax})</th></tr></thead>
                <tbody>
                    <tr class="tr-section"><td colspan="3">1 · COÛTS</td></tr>
                    <tr><td>Terrain</td><td>${fmt(o1.brut.pTerrain)} €</td><td>${fmt(o1.brut.pTerrain*o1.qteMax)} €</td></tr>
                    <tr><td>Construction</td><td>${fmt(o1.brut.pConst)} €</td><td>${fmt(o1.brut.pConst*o1.qteMax)} €</td></tr>
                    <tr><td>Taxe fixe</td><td>1 000 €</td><td>${fmt(1000*o1.qteMax)} €</td></tr>
                    <tr><td style="color:var(--orange)">Déficit chantier</td><td style="color:var(--orange)">${fmt(o1.deficit)} €</td><td style="color:var(--orange)">${fmt(o1.deficit*o1.qteMax)} €</td></tr>
                    <tr class="tr-total"><td>Coût global</td><td>${fmt(o1.coutTotal)} €</td><td>${fmt(o1.coutTotal*o1.qteMax)} €</td></tr>
                    <tr class="tr-section"><td colspan="3">2 · PLUS-VALUE (si revente)</td></tr>
                    <tr class="${o1.gainUnitaire>=0?'tr-gain':'tr-loss'}"><td>Plus-value nette</td><td class="${clsG}">${sigG}${fmt(o1.gainUnitaire)} €</td><td class="${clsG}">${sigG}${fmt(o1.gainTotalCumul)} €</td></tr>
                    <tr class="tr-section"><td colspan="3">3 · LOCATION (par jour)</td></tr>
                    <tr><td>Loyer brut</td><td>+${fmt(o2.brut.loyer)} €/j</td><td>+${fmt(o2.brut.loyer*o1.qteMax)} €/j</td></tr>
                    <tr><td>Charges</td><td>−${fmt(o2.brut.charge)} €/j</td><td>−${fmt(o2.brut.charge*o1.qteMax)} €/j</td></tr>
                    <tr><td>Impôts</td><td>−${fmt(o2.brut.impot)} €/j</td><td>−${fmt(o2.brut.impot*o1.qteMax)} €/j</td></tr>
                    <tr class="tr-total"><td>Cashflow net</td><td><span class="${cfCls}">${fmtS(o2.cfNet,' €/j')}</span></td><td><span class="${cfCls}">${fmtS(o2.cfNet*o1.qteMax,' €/j')}</span></td></tr>
                </tbody>
            </table>
        </div>`;
        document.getElementById('modalOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    /* ══════════════════════════════════════════════
       fermerModal — Ferme la modal en cliquant en dehors ou sur ×
       - Ne ferme que si l'événement vient du fond de l'overlay (pas du contenu modal)
       - Remet le scroll du body
    ══════════════════════════════════════════════ */
    function fermerModal(e) {
        if (e && e.target !== document.getElementById('modalOverlay')) return;
        document.getElementById('modalOverlay').classList.remove('open');
        document.body.style.overflow = '';
        oppOuverte = null;
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') fermerModal(); });

    /* ══════════════════════════════════════════════
       changerTerrain — Met à jour le terrain d'un bâtiment depuis la modal
       - Met à jour choixTerrain[nomBat] avec le nouvel index
       - Invalide le cache de calcul (dataCache reste mais opps sont recalculées)
       - Ferme la modal, relance l'analyse, rouvre la modal mise à jour
    ══════════════════════════════════════════════ */
    function changerTerrain(nomBat, idx) {
        choixTerrain[nomBat] = parseInt(idx);
        dataCache = null;
        fermerModal();
        analyser(false).then(() => {
            const updated = opps1.find(o => o.nom === nomBat);
            if (updated) ouvrirModal1(updated);
        });
    }
</script>
</body>
</html>
