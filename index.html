<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpireImmo — Simulateur Tactique Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fond-sombre:   #080d17;
            --fond-carte:    #0f1826;
            --fond-input:    #060a12;
            --fond-hover:    #1a2540;
            --fond-detail:   #060a12;
            --texte-blanc:   #eef2ff;
            --texte-gris:    #6b7fa3;
            --texte-dim:     #3d4f6e;
            --bleu-flash:    #38bdf8;
            --bleu-glow:     rgba(56, 189, 248, 0.18);
            --bleu-survol:   #0ea5e9;
            --vert-gain:     #34d399;
            --vert-glow:     rgba(52, 211, 153, 0.15);
            --rouge-perte:   #fb7185;
            --rouge-glow:    rgba(251, 113, 133, 0.12);
            --orange-badge:  #fbbf24;
            --violet-badge:  #a78bfa;
            --bordure:       #1a2540;
            --bordure-vive:  #243357;
            --radius:        10px;
            --radius-lg:     16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', system-ui, sans-serif;
            background: var(--fond-sombre);
            color: var(--texte-blanc);
            padding: 12px;
            line-height: 1.5;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,0.06) 0%, transparent 70%);
        }

        /* ─── Conteneur principal ─── */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            padding: 28px 20px 24px;
        }

        .header-tag {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--bleu-flash);
            text-transform: uppercase;
            background: var(--bleu-glow);
            border: 1px solid rgba(56,189,248,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 800;
            color: var(--texte-blanc);
            letter-spacing: -0.5px;
            line-height: 1.15;
        }

        h1 span { color: var(--bleu-flash); }

        p.subtitle {
            color: var(--texte-gris);
            margin-top: 8px;
            font-size: 13px;
            font-weight: 400;
        }

        /* ─── Zone outils ─── */
        .zone-outils {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--fond-carte);
            border: 1px solid var(--bordure-vive);
            padding: 16px;
            border-radius: var(--radius-lg);
        }

        .outils-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .groupe-saisie {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--texte-gris);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"],
        .selecteur-strategie {
            padding: 11px 14px;
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            background-color: var(--fond-input);
            border: 1.5px solid var(--bordure-vive);
            border-radius: var(--radius);
            color: var(--texte-blanc);
            outline: none;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, .selecteur-strategie:focus {
            border-color: var(--bleu-flash);
            box-shadow: 0 0 0 3px var(--bleu-glow);
        }

        /* Filtre texte */
        .input-filtre {
            position: relative;
        }
        .input-filtre input {
            padding-left: 36px;
            font-family: 'Syne', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 600;
        }
        .input-filtre::before {
            content: "🔍";
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            pointer-events: none;
        }

        /* Checkbox custom */
        .groupe-case {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px 14px;
            background: var(--fond-input);
            border: 1.5px solid var(--bordure-vive);
            border-radius: var(--radius);
            transition: border-color 0.2s;
            user-select: none;
        }
        .groupe-case:hover { border-color: var(--bleu-flash); }
        .groupe-case input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--bleu-flash);
            cursor: pointer;
            flex-shrink: 0;
        }
        .groupe-case .check-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--texte-blanc);
        }

        /* Bouton */
        .btn-calculer {
            padding: 13px 28px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.5px;
            background: var(--bleu-flash);
            color: #060a12;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .btn-calculer:hover {
            background: var(--bleu-survol);
            color: white;
            box-shadow: 0 0 20px var(--bleu-glow);
        }
        .btn-calculer:active { transform: scale(0.97); }

        /* ─── Status ─── */
        #etat-chargement {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--texte-gris);
            margin-bottom: 16px;
            min-height: 30px;
        }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid var(--bordure-vive);
            border-top-color: var(--bleu-flash);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        .spinner.actif { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Compteur résultats */
        .barre-resultats {
            display: none;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 2px;
        }
        .barre-resultats.visible { display: flex; }
        .compteur {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--texte-gris);
        }
        .compteur strong { color: var(--bleu-flash); }

        /* ─── Tableau ─── */
        .conteneur-tableau {
            border-radius: var(--radius-lg);
            border: 1px solid var(--bordure-vive);
            background: var(--fond-carte);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--bordure);
            text-align: left;
            font-size: 12px;
        }

        thead tr {
            background: var(--fond-sombre);
        }

        th {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            color: var(--texte-gris);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            transition: color 0.15s;
        }
        th:hover { color: var(--bleu-flash); }
        th.tri-actif { color: var(--bleu-flash); }
        th .sort-icon { margin-left: 4px; opacity: 0.5; }
        th.tri-actif .sort-icon { opacity: 1; }

        tr.ligne-principale {
            cursor: pointer;
            transition: background 0.15s;
        }
        tr.ligne-principale:hover {
            background-color: var(--fond-hover);
        }
        tr.ligne-principale td:first-child {
            border-left: 3px solid transparent;
            transition: border-color 0.15s;
        }
        tr.ligne-principale:hover td:first-child,
        tr.ligne-principale.ouvert td:first-child {
            border-left-color: var(--bleu-flash);
        }

        .nom-cliquable {
            color: var(--texte-blanc);
            font-weight: 700;
            font-size: 13px;
        }

        .nom-chevron {
            color: var(--texte-dim);
            font-size: 10px;
            margin-right: 6px;
            transition: transform 0.2s;
            display: inline-block;
        }
        tr.ligne-principale.ouvert .nom-chevron {
            transform: rotate(90deg);
            color: var(--bleu-flash);
        }

        .type-sous-titre {
            display: block;
            font-size: 10px;
            color: var(--texte-gris);
            font-weight: 400;
            margin-top: 2px;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-conseil {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            margin-top: 4px;
        }

        /* Détails */
        .ligne-details {
            background-color: var(--fond-detail);
            display: none;
        }
        .ligne-details.visible {
            display: table-row;
        }

        .boite-details {
            padding: 12px 10px;
            border-left: 3px solid var(--bleu-flash);
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .boite-details h4 {
            margin: 0 0 12px 0;
            color: var(--texte-blanc);
            border-bottom: 1px solid var(--bordure-vive);
            padding-bottom: 8px;
            font-size: 13px;
            font-weight: 800;
        }

        /* Bloc résumé rapide */
        .recap-rapide {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        @media (min-width: 600px) {
            .recap-rapide { grid-template-columns: repeat(4, 1fr); }
        }
        .recap-card {
            background: var(--fond-carte);
            border: 1px solid var(--bordure-vive);
            border-radius: 8px;
            padding: 10px 12px;
            text-align: center;
        }
        .recap-card .rc-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--texte-blanc);
        }
        .recap-card .rc-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--texte-gris);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 3px;
        }

        /* Bloc plan */
        .bloc-plan {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--fond-sombre);
            border: 1px solid var(--bordure-vive);
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 12px;
        }
        .bloc-plan-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .bloc-plan-row strong { color: var(--texte-gris); font-size: 10px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }

        /* Selecteur terrain */
        .selecteur-terrain {
            padding: 8px 10px;
            border: 1.5px solid var(--bordure-vive);
            border-radius: 6px;
            font-weight: 600;
            background: var(--fond-input);
            color: var(--texte-blanc);
            cursor: pointer;
            outline: none;
            margin-top: 4px;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            transition: border-color 0.2s;
        }
        .selecteur-terrain:focus { border-color: var(--bleu-flash); }

        /* Badges */
        .badge-quantite {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(56,189,248,0.1);
            color: var(--bleu-flash);
            border: 1px solid rgba(56,189,248,0.2);
            padding: 3px 7px;
            border-radius: 5px;
            font-weight: 700;
            white-space: nowrap;
            font-size: 12px;
        }

        .badge-temps {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(251,191,36,0.1);
            color: var(--orange-badge);
            border: 1px solid rgba(251,191,36,0.2);
            padding: 3px 7px;
            border-radius: 5px;
            font-weight: 700;
            white-space: nowrap;
            font-size: 11px;
        }

        .badge-terrain-auto {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(167,139,250,0.08);
            color: var(--violet-badge);
            border: 1px solid rgba(167,139,250,0.15);
            padding: 4px 8px;
            border-radius: 5px;
            font-weight: 700;
            display: inline-block;
            font-size: 10px;
        }

        .badge-pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--texte-gris);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--bordure);
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 4px;
            font-weight: 600;
        }

        .texte-gain  { font-weight: 700; color: var(--vert-gain); font-family: 'JetBrains Mono', monospace; }
        .texte-perte { font-weight: 700; color: var(--rouge-perte); font-family: 'JetBrains Mono', monospace; }
        .texte-neutre { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

        /* Table interne */
        .table-details {
            width: 100%;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--bordure-vive);
        }
        .table-details th {
            background: #0a1120;
            color: var(--bleu-flash);
            font-size: 10px;
            text-transform: uppercase;
            padding: 9px 10px;
            border-bottom: 1px solid var(--bordure-vive);
            cursor: default;
            letter-spacing: 0.5px;
        }
        .table-details th:hover { color: var(--bleu-flash); }
        .table-details td {
            padding: 9px 10px;
            font-size: 11px;
            border-bottom: 1px solid var(--bordure);
            color: #c8d3e8;
            font-family: 'JetBrains Mono', monospace;
        }
        .table-details td:first-child {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            color: var(--texte-gris);
        }
        .table-details .section-titre {
            background: var(--fond-sombre);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--texte-dim);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .table-details .total-brut {
            background: #0a1525;
            font-weight: 700;
        }
        .table-details .total-brut td:first-child {
            color: var(--texte-blanc);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }
        .table-details .gain-sub  { background: var(--vert-glow); }
        .table-details .perte-sub { background: var(--rouge-glow); }

        .explication-formule {
            font-size: 10px;
            color: #3d4f6e;
            text-align: center;
            font-style: italic;
            padding: 6px 10px !important;
            background: var(--fond-sombre);
            font-family: 'Syne', sans-serif;
        }

        /* Ligne zéro résultat */
        .aucun-resultat {
            text-align: center;
            padding: 30px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--texte-gris);
            font-size: 12px;
        }

        /* ─── Responsive ─── */
        @media (min-width: 600px) {
            body { padding: 20px 16px; }
            .outils-row { flex-direction: row; align-items: flex-end; flex-wrap: wrap; }
            .groupe-saisie { flex: 1; min-width: 150px; }
            .btn-calculer { width: auto; }
        }

        @media (min-width: 900px) {
            body { padding: 28px 20px; }
            h1 { font-size: 32px; }
            th, td { font-size: 13px; padding: 13px 15px; }
            .nom-cliquable { font-size: 14px; }
            .boite-details { padding: 18px; }
            .table-details td { font-size: 12px; padding: 10px 12px; }
            .table-details td:first-child { font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-tag">EMPIRE IMMO · SIMULATEUR PRO</div>
        <h1>Conseiller <span>Tactique</span></h1>
        <p class="subtitle">Analyse stratégique avec déficit de chantier · Données en temps réel</p>
    </div>

    <!-- Zone outils -->
    <div class="zone-outils">
        <div class="outils-row">
            <div class="groupe-saisie">
                <label for="budgetInput">Capital disponible (€)</label>
                <input type="text" id="budgetInput" value="1 000 000" autocomplete="off">
            </div>
            <div class="groupe-saisie">
                <label for="strategieSelect">Objectif prioritaire</label>
                <select id="strategieSelect" class="selecteur-strategie" onchange="analyserStrategieAmortissement(false)">
                    <option value="plusvalue">🚀 Max Plus-value (Revente)</option>
                    <option value="cashflow">💰 Max Rente Nette</option>
                    <option value="roi">⏱️ Amortissement Rapide</option>
                </select>
            </div>
            <div class="groupe-saisie" style="flex: 0 0 auto;">
                <label>&nbsp;</label>
                <label class="groupe-case">
                    <input type="checkbox" id="entrepriseCheck" checked onchange="analyserStrategieAmortissement(false)">
                    <span class="check-label">🏢 Entreprises</span>
                </label>
            </div>
            <div class="groupe-saisie" style="flex: 0 0 auto;">
                <label>&nbsp;</label>
                <button class="btn-calculer" onclick="analyserStrategieAmortissement(true)">Calculer →</button>
            </div>
        </div>

        <!-- Filtre par nom -->
        <div class="input-filtre">
            <input type="text" id="filtreNom" placeholder="Filtrer les bâtiments par nom…" oninput="filtrerTableau()" style="font-size:13px;">
        </div>
    </div>

    <!-- Status -->
    <div id="etat-chargement">
        <div class="spinner" id="spinner"></div>
        <span id="statusTexte">Entrez votre capital et cliquez sur Calculer.</span>
    </div>

    <!-- Barre résultats -->
    <div class="barre-resultats" id="barreResultats">
        <span class="compteur" id="compteurResultats"></span>
    </div>

    <!-- Tableau -->
    <div class="conteneur-tableau">
        <table id="resultsTable" style="display: none;">
            <thead>
                <tr>
                    <th onclick="trierColonne('nom')">
                        Bâtiment / Plan conseillé <span class="sort-icon" id="sort-nom">⇅</span>
                    </th>
                    <th onclick="trierColonne('quantite')" style="white-space:nowrap;">
                        Max <span class="sort-icon" id="sort-quantite">⇅</span>
                    </th>
                    <th onclick="trierColonne('performance')" style="white-space:nowrap;">
                        Performance <span class="sort-icon" id="sort-performance">⇅</span>
                    </th>
                    <th onclick="trierColonne('remboursement')" style="white-space:nowrap;">
                        ROI (jours) <span class="sort-icon" id="sort-remboursement">⇅</span>
                    </th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>

</div><!-- /container -->

<script>
    const MON_PROXY = 'https://mon-proxy-empire.yangtiradol.workers.dev/?url=';
    const API_BUILDINGS = MON_PROXY + encodeURIComponent('https://monde8.empireimmo.com/api/buildings.json');

    /* ────────────────────────────────────────────────
       SPECS : temps de construction + terrain requis
    ──────────────────────────────────────────────── */
    const SPECS_BUILDINGS = {
        "Chambre seule habitable": {"temps_construction": "0", "terrain_necessaire": ""},
        "Chambre seule non-aménagée": {"temps_construction": "0", "terrain_necessaire": ""},
        "Chambre seule tout confort": {"temps_construction": "0", "terrain_necessaire": ""},
        "Chambre seule équipée": {"temps_construction": "0", "terrain_necessaire": ""},
        "Complexe résidentiel géant habitable": {"temps_construction": "20", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel géant luxueux": {"temps_construction": "20", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel géant non-aménagé": {"temps_construction": "20", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel géant tout confort": {"temps_construction": "20", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel millenium habitable": {"temps_construction": "102", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel millenium luxueux": {"temps_construction": "102", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel millenium non-aménagé": {"temps_construction": "102", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel millenium tout confort": {"temps_construction": "102", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel moyen habitable": {"temps_construction": "16", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel moyen luxueux": {"temps_construction": "16", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel moyen non-aménagé": {"temps_construction": "16", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel moyen tout confort": {"temps_construction": "16", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel palacium habitable": {"temps_construction": "102", "terrain_necessaire": "Grand parc"},
        "Complexe résidentiel palacium luxueux": {"temps_construction": "102", "terrain_necessaire": "Grand parc"},

    function toggleDetails(idUnique) {
        const trDetails = document.getElementById(idUnique);
        const trParent  = document.getElementById('principal-' + idUnique);
        if (!trDetails) return;

        const estOuvert = trDetails.classList.contains('visible');
        trDetails.classList.toggle('visible', !estOuvert);
        if (trParent) trParent.classList.toggle('ouvert', !estOuvert);

    /* ─────────────────────────────────────────
       Filtre par nom (live)
    ───────────────────────────────────────── */
    function filtrerTableau() {
        const terme = document.getElementById('filtreNom').value.toLowerCase().trim();
        const lignesPrincipales = document.querySelectorAll('tr.ligne-principale');
        let nbVisibles = 0;

        lignesPrincipales.forEach(tr => {
            const nomBat = (tr.dataset.nom || '').toLowerCase();
            const visible = terme === '' || nomBat.includes(terme);
            tr.style.display = visible ? '' : 'none';

            // Masquer/afficher le détail associé
            const idDetails = tr.dataset.idDetails;
            if (idDetails) {
                const trDet = document.getElementById(idDetails);
                if (trDet) trDet.style.display = visible ? (trDet.classList.contains('visible') ? 'table-row' : 'none') : 'none';
            }
            if (visible) nbVisibles++;
        });

        // Mettre à jour le compteur
        const total = lignesPrincipales.length;
        const cptEl = document.getElementById('compteurResultats');
        if (terme) {
            cptEl.innerHTML = `<strong>${nbVisibles}</strong> / ${total} bâtiments`;
        } else {
            cptEl.innerHTML = `<strong>${total}</strong> opportunités trouvées`;
        }
    }

    /* ─────────────────────────────────────────
       Tri par colonne
    ───────────────────────────────────────── */
    const colonnesTriMap = {
        nom:           (a, b) => a.nom.localeCompare(b.nom),
        quantite:      (a, b) => a.quantiteMax - b.quantiteMax,
        performance:   (a, b) => {
            const strat = document.getElementById('strategieSelect').value;
            if (strat === 'plusvalue') return a.gainTotalCumule - b.gainTotalCumule;
            if (strat === 'cashflow') return a.cashflowTotalCumule - b.cashflowTotalCumule;
            return a.joursRemboursementNum - b.joursRemboursementNum;
        },
        remboursement: (a, b) => a.joursRemboursementNum - b.joursRemboursementNum,
    };

    function trierColonne(col) {
        // Mise à jour sens
        if (triColonne === col) {
            triSens *= -1;
        } else {
            triColonne = col;
            triSens = -1; // desc par défaut (les meilleurs en premier)
        }

        // Reset icônes
        document.querySelectorAll('.sort-icon').forEach(el => el.textContent = '⇅');
        const iconEl = document.getElementById('sort-' + col);
        if (iconEl) iconEl.textContent = triSens === -1 ? '↓' : '↑';
        document.querySelectorAll('th').forEach(th => th.classList.remove('tri-actif'));
        document.querySelectorAll('th').forEach(th => {
            if (th.querySelector('#sort-' + col)) th.classList.add('tri-actif');
        });

        opportunitesCourantes.sort((a, b) => triSens * colonnesTriMap[col](a, b));
        rendreTableau(opportunitesCourantes);
    }

    ───────────────────────────────────────── */
    function rendreTableau(liste) {
        const tbody     = document.getElementById('resultsBody');
        const table     = document.getElementById('resultsTable');
        const strategieFiltre = document.getElementById('strategieSelect').value;
        const terrains  = dataBuildings.batiments_terrain || [];

        tbody.innerHTML = '';

        if (liste.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="aucun-resultat">Aucune opportunité — fonds insuffisants ou déficit trop lourd.</td></tr>`;
        } else {
            liste.forEach(o => construireHTML(o, strategieFiltre, terrains));
        }

        table.style.display = 'table';

        // Barre résultats
        const barre = document.getElementById('barreResultats');
        barre.classList.add('visible');
        document.getElementById('compteurResultats').innerHTML = `<strong>${liste.length}</strong> opportunités trouvées`;

        // Ré-appliquer le filtre texte s'il y en a un
        const terme = document.getElementById('filtreNom').value.trim();
        if (terme) filtrerTableau();
    }

    /* ─────────────────────────────────────────
       CALCUL PRINCIPAL
    ───────────────────────────────────────── */
    async function analyserStrategieAmortissement(remettreAzeroStatut = true) {
        const budgetStr   = document.getElementById('budgetInput').value.replace(/\s/g, '').replace(/\u202f/g, '');
        const budget      = parseFloat(budgetStr);
        const inclureEnt  = document.getElementById('entrepriseCheck').checked;
        const strategie   = document.getElementById('strategieSelect').value;

        const statusTexte = document.getElementById('statusTexte');
        const spinner     = document.getElementById('spinner');
        const table       = document.getElementById('resultsTable');
        const barre       = document.getElementById('barreResultats');

        if (isNaN(budget) || budget <= 0) {
            statusTexte.textContent = '⚠️ Veuillez entrer une somme valide.';
            return;
        }

        if (remettreAzeroStatut) {
            statusTexte.textContent = 'Calcul des opportunités…';
            spinner.classList.add('actif');
            barre.classList.remove('visible');
        }

        document.getElementById('resultsBody').innerHTML = '';

        try {
            /* -- Chargement API (mis en cache) -- */
            if (!dataBuildings) {
                const res = await fetch(API_BUILDINGS);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                dataBuildings = await res.json();
            }

            const terrains      = dataBuildings.batiments_terrain || [];
            let listeBatiments  = [];

            if (dataBuildings.batiments_perso)
                dataBuildings.batiments_perso.forEach(b => { b.categorie = '🏡 Personnel'; listeBatiments.push(b); });
            if (inclureEnt && dataBuildings.batiments_entreprise)
                dataBuildings.batiments_entreprise.forEach(b => { b.categorie = '🏢 Entreprise'; listeBatiments.push(b); });

            /* -- Calcul opportunités -- */
            let opportunites = [];

            listeBatiments.forEach((b, index) => {
                const prixConstruction = parseFloat(b.construction) || 0;
                if (prixConstruction <= 0) return;

                const specs           = SPECS_BUILDINGS[b.nom] || { temps_construction: '0', terrain_necessaire: '' };
                const tempsConstJours = parseInt(specs.temps_construction) || 0;
                const terrainReq      = specs.terrain_necessaire || '';

                /* -- Résolution du terrain -- */
                let terrainApplique = null;
                let aBesoinDeSelecteur = true;

                if (terrainReq.trim()) {
                    terrainApplique = terrains.find(t => t.nom.toLowerCase().trim() === terrainReq.toLowerCase().trim());
                    if (terrainApplique) aBesoinDeSelecteur = false;
                }

                if (!terrainApplique) {
                    if (choixTerrainsUtilisateur[b.nom] === undefined) choixTerrainsUtilisateur[b.nom] = 0;
                    terrainApplique = terrains[choixTerrainsUtilisateur[b.nom]] || terrains[0];
                }

                /* -- Calculs financiers -- */
                const prixTerrain       = parseFloat(terrainApplique.valeur) || 0;
                const valeurFinale      = parseFloat(b.valeur) || 0;
                const loyer             = parseFloat(b.loyer) || 0;
                const charge            = parseFloat(b.charge) || 0;
                const impot             = parseFloat(b.impot) || 0;

                const deficitChantier   = (charge + impot) * tempsConstJours;
                const coutLancement     = prixTerrain + prixConstruction + 1000;
                const coutGlobalSecurise= coutLancement + deficitChantier;
                const gainUnitaire      = valeurFinale - coutGlobalSecurise;
                const quantiteMax       = Math.floor(budget / coutGlobalSecurise);

                if (quantiteMax <= 0) return;

                const gainTotalCumule   = gainUnitaire * quantiteMax;
                const gainNetLocatif    = loyer - (charge + impot);
                const cashflowTotalCumule = gainNetLocatif * quantiteMax;

                let joursRemboursementNum = Infinity;
                let tempsRemboursement    = 'Loyer nul / Déficit';
                if (gainNetLocatif > 0) {
                    joursRemboursementNum = coutGlobalSecurise / gainNetLocatif;
                    tempsRemboursement    = `${joursRemboursementNum.toFixed(1)} j`;
                }

                /* -- Plan recommandé -- */
                let planRecommande = '';
                let couleurPlan    = '';
                if (gainUnitaire <= 0 && gainNetLocatif <= 0) {
                    planRecommande = '❌ PERTE SÈCHE (Éviter)';
                    couleurPlan    = 'background:rgba(251,113,133,0.15);color:var(--rouge-perte);';
                } else if (gainNetLocatif <= 0 && gainUnitaire > 0) {
                    planRecommande = '🚀 ACHAT-REVENTE IMPÉRATIF';
                    couleurPlan    = 'background:rgba(56,189,248,0.15);color:var(--bleu-flash);';
                } else if (joursRemboursementNum <= 1000) {
                    planRecommande = '💰 RENTE ULTRA RENTABLE';
                    couleurPlan    = 'background:rgba(52,211,153,0.15);color:var(--vert-gain);';
                } else if (joursRemboursementNum <= 2000) {
                    planRecommande = '⚖️ MIXTE / ARBITRAGE';
                    couleurPlan    = 'background:rgba(167,139,250,0.15);color:var(--violet-badge);';
                } else {
                    planRecommande = '🚀 ACHAT-REVENTE CONSEILLÉ';
                    couleurPlan    = 'background:rgba(251,191,36,0.15);color:var(--orange-badge);';
                }

                /* -- Pourcentages -- */
                const pctTerrain       = ((prixTerrain        / coutGlobalSecurise) * 100).toFixed(1);
                const pctConst         = ((prixConstruction   / coutGlobalSecurise) * 100).toFixed(1);
                const pctDeficit       = ((deficitChantier    / coutGlobalSecurise) * 100).toFixed(1);
                const pctMargeRevente  = ((gainUnitaire       / coutGlobalSecurise) * 100).toFixed(1);
                const pctRendementJour = gainNetLocatif > 0
                    ? ((gainNetLocatif / coutGlobalSecurise) * 100).toFixed(2)
                    : '0.00';

                opportunites.push({
                    idUnique: `details-${index}`,
                    nom: b.nom,
                    type: b.categorie,
                    coutGlobalSecurise,
                    deficitChantier,
                    quantiteMax,
                    gainTotalCumule,
                    cashflowTotalCumule,
                    joursRemboursementNum,
                    tempsRemboursement,
                    tempsConstruction: tempsConstJours > 0 ? `${tempsConstJours} jours` : 'Immédiat',
                    terrainNecessaire: terrainReq,
                    aBesoinDeSelecteur,
                    terrainApplique,
                    planRecommande,
                    couleurPlan,
                    pcts: { terrain: pctTerrain, construction: pctConst, deficit: pctDeficit, margeRevente: pctMargeRevente, rendementJour: pctRendementJour },
                    brut: { terrainPrix: prixTerrain, construction: prixConstruction, valeurFinale, loyer, charge, impot, gainNetLocatif }
                });
            });

            /* -- Tri selon stratégie par défaut -- */
            if (strategie === 'plusvalue')
                opportunites.sort((a, b) => b.gainTotalCumule - a.gainTotalCumule);
            else if (strategie === 'cashflow')
                opportunites.sort((a, b) => b.cashflowTotalCumule - a.cashflowTotalCumule);
            else
                opportunites.sort((a, b) => a.joursRemboursementNum - b.joursRemboursementNum);

            opportunitesCourantes = opportunites; // mémoriser pour tri ultérieur

            rendreTableau(opportunites);

            if (remettreAzeroStatut)
                statusTexte.textContent = 'Cliquez sur un bâtiment pour voir sa fiche complète.';

        } catch (err) {
            console.error(err);
            statusTexte.textContent = '⚠️ Erreur réseau ou calcul — vérifiez votre connexion au proxy.';
            document.getElementById('resultsTable').style.display = 'none';
        } finally {
            spinner.classList.remove('actif');
        }
    }
</script>
